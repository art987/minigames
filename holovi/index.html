<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全息视界 | Holographic Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f0ff;
            --secondary: #ff00ea;
            --dark: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 255, 0.1) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* 头部 */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.8);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 20px;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 10px 24px;
            border-radius: 25px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.3), rgba(255, 0, 234, 0.3));
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        /* 视频网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 240, 255, 0.2);
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .video-card:hover::before {
            left: 100%;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            position: relative;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-size: 200% 200%;
        }

        .thumbnail.shimmer {
            animation: shimmer 2s ease infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .video-card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.15);
            background: rgba(0, 240, 255, 1);
            box-shadow: 0 6px 30px rgba(0, 240, 255, 0.5);
        }

        .play-overlay svg {
            width: 22px;
            height: 22px;
            fill: #333;
            margin-left: 4px;
            transition: fill 0.3s;
        }

        .video-card:hover .play-overlay svg {
            fill: #000;
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .video-meta {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-tag {
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary);
            font-size: 11px;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        /* 全屏播放器 */
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-overlay.active {
            display: flex;
            opacity: 1;
        }

        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* 控制栏 - 默认隐藏，鼠标移动时显示 */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-overlay:hover .controls,
        .controls.visible {
            opacity: 1;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            border-radius: 2px;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-container:hover .progress-bar::after {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-left, .controls-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .control-btn.play-pause svg {
            width: 32px;
            height: 32px;
        }

        .time-display {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-variant-numeric: tabular-nums;
            min-width: 100px;
        }

        .loop-btn.active {
            color: var(--primary);
            background: rgba(0, 240, 255, 0.2);
        }

        /* 顶部信息栏 */
        .top-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-overlay:hover .top-info {
            opacity: 1;
        }

        .now-playing {
            font-size: 18px;
            font-weight: 600;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.5);
            transform: rotate(90deg);
        }

        /* 加载动画 */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 240, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.9);
            padding: 16px 32px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 16px;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .toast.show {
            transform: translate(-50%, -50%) scale(1);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 15px;
            }
            
            .controls {
                padding: 20px;
            }
            
            .time-display {
                font-size: 12px;
                min-width: 80px;
            }
        }

        /* 键盘快捷键提示 */
        .shortcuts-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .shortcuts-hint.visible {
            opacity: 1;
        }

        .shortcuts-hint div {
            margin: 4px 0;
        }

        .key {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-right: 8px;
            font-family: monospace;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <div class="logo">◈ 全息视界</div>
        <div style="font-size: 14px; color: rgba(255,255,255,0.5);">沉浸式全息视频体验</div>
    </header>

    <div class="category-tabs">
        <div class="tab active" data-category="all">全部</div>
        <div class="tab" data-category="animal">动物</div>
    </div>

    <div class="video-grid" id="videoGrid">
        <!-- 视频卡片将通过JS动态生成 -->
    </div>

    <!-- 全屏播放器 -->
    <div class="player-overlay" id="playerOverlay">
        <div class="video-container">
            <div class="loader" id="loader"></div>
            
            <div class="top-info">
                <div class="now-playing" id="nowPlaying">正在播放...</div>
                <button class="close-btn" id="closeBtn" title="退出播放 (ESC)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <video id="videoPlayer" playsinline></video>

            <div class="controls" id="controls">
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                
                <div class="controls-row">
                    <div class="controls-left">
                        <button class="control-btn play-pause" id="playPauseBtn">
                            <svg viewBox="0 0 24 24" id="playIcon">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                            <svg viewBox="0 0 24 24" id="pauseIcon" style="display: none;">
                                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                            </svg>
                        </button>
                        
                        <button class="control-btn" id="prevBtn" title="上一个 (P)">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                            </svg>
                        </button>
                        
                        <button class="control-btn" id="nextBtn" title="下一个 (N)">
                            <svg viewBox="0 0 24 24">
                                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                            </svg>
                        </button>
                        
                        <div class="time-display">
                            <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                        </div>
                    </div>

                    <div class="controls-right">
                        <button class="control-btn loop-btn" id="loopBtn" title="循环播放 (L)">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                            </svg>
                        </button>
                        
                        <button class="control-btn" id="fullscreenBtn" title="全屏 (F)">
                            <svg viewBox="0 0 24 24" id="fullscreenIcon">
                                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                            </svg>
                            <svg viewBox="0 0 24 24" id="exitFullscreenIcon" style="display: none;">
                                <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    
    <div class="shortcuts-hint" id="shortcutsHint">
        <div><span class="key">Space</span> 播放/暂停</div>
        <div><span class="key">←</span> <span class="key">→</span> 快进/快退</div>
        <div><span class="key">F</span> 全屏</div>
        <div><span class="key">L</span> 循环</div>
        <div><span class="key">N</span> <span class="key">P</span> 下/上一个</div>
        <div><span class="key">ESC</span> 退出</div>
    </div>

    <script src="videoData.js"></script>
    <script>
        let currentVideoIndex = 0;
        let isLooping = false;
        let hideControlsTimeout;
        let currentCategory = 'all';

        const videoGrid = document.getElementById('videoGrid');
        const playerOverlay = document.getElementById('playerOverlay');
        const videoPlayer = document.getElementById('videoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const loopBtn = document.getElementById('loopBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const closeBtn = document.getElementById('closeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const nowPlaying = document.getElementById('nowPlaying');
        const toast = document.getElementById('toast');
        const loader = document.getElementById('loader');
        const shortcutsHint = document.getElementById('shortcutsHint');

        // 初始化
        function init() {
            renderVideos();
            setupEventListeners();
            showShortcutsHint();
        }

        // 渲染视频网格
        function renderVideos() {
            const filtered = currentCategory === 'all' 
                ? videoData 
                : videoData.filter(v => v.category === currentCategory);

            if (filtered.length === 0) {
                videoGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
                        <div>该分类暂无视频</div>
                    </div>
                `;
                return;
            }

            videoGrid.innerHTML = filtered.map((video, index) => `
                <div class="video-card" data-id="${video.id}" data-index="${index}">
                    <div style="position: relative;">
                        <img src="${getPlaceholderImage(video, index)}" class="thumbnail ${!video.thumbnail ? 'shimmer' : ''}" alt="${video.title}">
                        <div class="play-overlay">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">
                            <span class="category-tag">${getCategoryName(video.category)}</span>
                            <span class="video-duration" data-id="${video.id}">--:--</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // 加载视频时长
            filtered.forEach((video, index) => {
                if (!video.duration) {
                    const tempVideo = document.createElement('video');
                    tempVideo.src = video.src;
                    tempVideo.addEventListener('loadedmetadata', () => {
                        const duration = formatTime(tempVideo.duration);
                        const durationEl = document.querySelector(`.video-duration[data-id="${video.id}"]`);
                        if (durationEl) durationEl.textContent = duration;
                    });
                }
            });

            // 绑定点击事件
            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    const video = videoData.find(v => v.id === id);
                    const index = videoData.indexOf(video);
                    playVideo(index);
                });
            });
        }

        function getCategoryName(cat) {
            return categoryMap[cat] || cat;
        }

        function getPlaceholderImage(video, index) {
            if (video.thumbnail) return video.thumbnail;
            const colors = categoryColors[video.category] || ['#667eea', '#764ba2'];
            const colorIndex = index % colors.length;
            const gradient = `linear-gradient(135deg, ${colors[colorIndex]}, ${colors[(colorIndex + 1) % colors.length]})`;
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 180'><rect fill='${encodeURIComponent(gradient)}' width='320' height='180'/><circle cx='160' cy='90' r='35' fill='rgba(255,255,255,0.2)'/><path d='M150 75 L150 105 L185 90 Z' fill='white'/></svg>`;
            return `data:image/svg+xml,${svg}`;
        }

        // 播放视频
        function playVideo(index) {
            currentVideoIndex = index;
            const video = videoData[index];
            
            playerOverlay.classList.add('active');
            loader.style.display = 'block';
            
            videoPlayer.src = video.src;
            nowPlaying.textContent = video.title;
            
            videoPlayer.play().then(() => {
                loader.style.display = 'none';
                updatePlayPauseIcon(true);
                enterFullscreen();
            }).catch(err => {
                console.error('播放失败:', err);
                showToast('视频加载失败');
            });
        }

        // 进入全屏
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => console.log('全屏请求失败:', err));
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // 退出全屏
        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }

        // 播放/暂停切换
        function togglePlay() {
            if (videoPlayer.paused) {
                videoPlayer.play();
                updatePlayPauseIcon(true);
            } else {
                videoPlayer.pause();
                updatePlayPauseIcon(false);
            }
        }

        function updatePlayPauseIcon(playing) {
            playIcon.style.display = playing ? 'none' : 'block';
            pauseIcon.style.display = playing ? 'block' : 'none';
        }

        // 更新进度条
        function updateProgress() {
            const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            progressBar.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(videoPlayer.currentTime);
            if (videoPlayer.duration) {
                durationEl.textContent = formatTime(videoPlayer.duration);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 点击进度条跳转
        function seek(e) {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            videoPlayer.currentTime = pos * videoPlayer.duration;
        }

        // 播放下一个
        function playNext() {
            if (currentVideoIndex < videoData.length - 1) {
                playVideo(currentVideoIndex + 1);
            } else {
                playVideo(0); // 循环到第一个
            }
        }

        // 播放上一个
        function playPrev() {
            if (currentVideoIndex > 0) {
                playVideo(currentVideoIndex - 1);
            } else {
                playVideo(videoData.length - 1); // 循环到最后一个
            }
        }

        // 显示提示
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 显示快捷键提示
        function showShortcutsHint() {
            setTimeout(() => {
                shortcutsHint.classList.add('visible');
                setTimeout(() => {
                    shortcutsHint.classList.remove('visible');
                }, 5000);
            }, 1000);
        }

        // 事件监听
        function setupEventListeners() {
            // 分类切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderVideos();
                });
            });

            // 视频事件
            videoPlayer.addEventListener('timeupdate', updateProgress);
            videoPlayer.addEventListener('ended', () => {
                if (isLooping) {
                    videoPlayer.currentTime = 0;
                    videoPlayer.play();
                } else {
                    playNext();
                }
            });
            videoPlayer.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(videoPlayer.duration);
            });

            // 控制按钮
            playPauseBtn.addEventListener('click', togglePlay);
            
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                playPrev();
            });
            
            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                playNext();
            });

            loopBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isLooping = !isLooping;
                loopBtn.classList.toggle('active', isLooping);
                showToast(isLooping ? '已开启循环播放' : '已关闭循环播放');
            });

            fullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (document.fullscreenElement) {
                    exitFullscreen();
                } else {
                    enterFullscreen();
                }
            });

            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log('Close button clicked');
                closePlayer();
            });

            // 进度条
            progressContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                seek(e);
            });

            // 点击视频区域播放/暂停
            videoPlayer.addEventListener('click', togglePlay);

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (!playerOverlay.classList.contains('active')) return;
                
                switch(e.key) {
                    case ' ':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'Escape':
                        closePlayer();
                        break;
                    case 'f':
                    case 'F':
                        if (document.fullscreenElement) {
                            exitFullscreen();
                        } else {
                            enterFullscreen();
                        }
                        break;
                    case 'l':
                    case 'L':
                        isLooping = !isLooping;
                        loopBtn.classList.toggle('active', isLooping);
                        showToast(isLooping ? '已开启循环播放' : '已关闭循环播放');
                        break;
                    case 'n':
                    case 'N':
                        playNext();
                        break;
                    case 'p':
                    case 'P':
                        playPrev();
                        break;
                    case 'ArrowRight':
                        videoPlayer.currentTime += 10;
                        showToast('快进 10 秒');
                        break;
                    case 'ArrowLeft':
                        videoPlayer.currentTime -= 10;
                        showToast('快退 10 秒');
                        break;
                }
            });

            // 自动隐藏控制栏
            let mouseTimer;
            playerOverlay.addEventListener('mousemove', () => {
                document.getElementById('controls').classList.add('visible');
                clearTimeout(mouseTimer);
                mouseTimer = setTimeout(() => {
                    if (!videoPlayer.paused) {
                        document.getElementById('controls').classList.remove('visible');
                    }
                }, 3000);
            });

            // 全屏状态监听
            document.addEventListener('fullscreenchange', () => {
                const fullscreenIcon = document.getElementById('fullscreenIcon');
                const exitFullscreenIcon = document.getElementById('exitFullscreenIcon');
                if (document.fullscreenElement) {
                    fullscreenIcon.style.display = 'none';
                    exitFullscreenIcon.style.display = 'block';
                } else {
                    fullscreenIcon.style.display = 'block';
                    exitFullscreenIcon.style.display = 'none';
                }
            });
        }

        function closePlayer() {
            videoPlayer.pause();
            playerOverlay.classList.remove('active');
            exitFullscreen();
        }

        // 启动
        init();
    </script>
</body>
</html>
