        <p>原始分按照最近最低原则,比如您得到的原始分为62,虽然62离61比64近,但是62比61大,所以表中应该选择64的原始分。</p>

<script src="iq-standard.js"></script>

<!-- 结果计算 -->
<script>
    function displayResult() {
        // 从localStorage读取结果
        const resultData = localStorage.getItem('testResult');
        
        if (!resultData) {
            document.getElementById('result-content').innerHTML = `
                <div style="text-align: center; padding: 50px 20px; color: #999;">
                    <p>暂无测试结果</p>
                    <p style="margin-top: 20px;">
                        <a href="index.html" style="color: #7739e5; text-decoration: none;">点击开始测试</a>
                    </p>
                </div>
            `;
            return;
        }
        
        const result = JSON.parse(resultData);
        
        // 显示原始分数
        document.getElementById('raw-score').textContent = result.rawScore + '分';
        
        // 显示基本信息
        document.getElementById('test-time').textContent = '测试时间: ' + result.testTime;
        document.getElementById('correct-answers').textContent = result.rawScore + '题';
        
        // 计算IQ
        const iqResult = iqStandard.calculateIQ(result.age, result.rawScore);
        const iqLevel = iqStandard.getIQLevel(iqResult.iq);
        
        // 显示IQ结果
        document.getElementById('iq-number').textContent = iqResult.iq;
        document.getElementById('iq-number').style.color = iqLevel.color;
        
        document.getElementById('iq-level').textContent = iqLevel.label;
        document.getElementById('iq-level').style.background = iqLevel.color;
        
        document.getElementById('age-group').textContent = iqResult.ageGroup + '岁年龄段';
        document.getElementById('matched-score').textContent = iqResult.matchedScore + '分';
    }
    
    // 页面加载后显示结果
    window.onload = displayResult;
</script>
