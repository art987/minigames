<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 - 闪喵游戏中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #faf8ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    .game-header {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .game-title {
      font-size: 48px;
      font-weight: bold;
      color: #776e65;
    }
    
    .score-container {
      display: flex;
      gap: 10px;
    }
    
    .score-box {
      background: #bbada0;
      padding: 10px 20px;
      border-radius: 6px;
      text-align: center;
      min-width: 80px;
    }
    
    .score-label {
      font-size: 12px;
      color: #eee4da;
      text-transform: uppercase;
    }
    
    .score-value {
      font-size: 24px;
      font-weight: bold;
      color: white;
    }
    
    .game-container {
      position: relative;
      width: 100%;
      max-width: 500px;
    }
    
    .grid-container {
      background: #bbada0;
      border-radius: 6px;
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }
    
    .grid-cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 6px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      color: #776e65;
    }
    
    .grid-cell[data-value="2"] { background: #eee4da; }
    .grid-cell[data-value="4"] { background: #ede0c8; }
    .grid-cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
    .grid-cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
    .grid-cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
    .grid-cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
    .grid-cell[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 35px; }
    .grid-cell[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 35px; }
    .grid-cell[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 35px; }
    .grid-cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 30px; }
    .grid-cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 30px; }
    
    .game-message {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(238, 228, 218, 0.73);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
    }
    
    .game-message.active {
      opacity: 1;
      visibility: visible;
    }
    
    .game-message h2 {
      font-size: 40px;
      color: #776e65;
      margin-bottom: 20px;
    }
    
    .retry-btn {
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      padding: 15px 30px;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
    }
    
    .retry-btn:hover {
      background: #9f8b77;
    }
    
    .instructions {
      margin-top: 20px;
      text-align: center;
      color: #776e65;
      font-size: 14px;
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← 返回</a>
  
  <div class="game-header">
    <h1 class="game-title">2048</h1>
    <div class="score-container">
      <div class="score-box">
        <div class="score-label">分数</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">最高</div>
        <div class="score-value" id="best-score">0</div>
      </div>
    </div>
  </div>
  
  <div class="game-container">
    <div class="grid-container" id="grid">
      <!-- 格子将通过 JS 生成 -->
    </div>
    
    <div class="game-message" id="game-message">
      <h2 id="message-text">游戏结束!</h2>
      <button class="retry-btn" onclick="initGame()">再试一次</button>
    </div>
  </div>
  
  <p class="instructions">使用方向键或滑动屏幕移动方块</p>
  
  <script>
    let grid = [];
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('best2048') || '0');
    let gameOver = false;
    
    function initGame() {
      grid = Array(4).fill(null).map(() => Array(4).fill(0));
      score = 0;
      gameOver = false;
      document.getElementById('game-message').classList.remove('active');
      document.getElementById('best-score').textContent = bestScore;
      addRandomTile();
      addRandomTile();
      render();
    }
    
    function addRandomTile() {
      const empty = [];
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          if (grid[i][j] === 0) empty.push({i, j});
        }
      }
      if (empty.length > 0) {
        const {i, j} = empty[Math.floor(Math.random() * empty.length)];
        grid[i][j] = Math.random() < 0.9 ? 2 : 4;
      }
    }
    
    function render() {
      const gridEl = document.getElementById('grid');
      gridEl.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          if (grid[i][j] !== 0) {
            cell.textContent = grid[i][j];
            cell.dataset.value = grid[i][j];
          }
          gridEl.appendChild(cell);
        }
      }
      document.getElementById('score').textContent = score;
    }
    
    function move(direction) {
      if (gameOver) return;
      
      let moved = false;
      const newGrid = grid.map(row => [...row]);
      
      if (direction === 'left') {
        for (let i = 0; i < 4; i++) {
          const row = newGrid[i].filter(x => x !== 0);
          for (let j = 0; j < row.length - 1; j++) {
            if (row[j] === row[j + 1]) {
              row[j] *= 2;
              score += row[j];
              row.splice(j + 1, 1);
            }
          }
          while (row.length < 4) row.push(0);
          if (newGrid[i].join(',') !== row.join(',')) moved = true;
          newGrid[i] = row;
        }
      } else if (direction === 'right') {
        for (let i = 0; i < 4; i++) {
          const row = newGrid[i].filter(x => x !== 0);
          for (let j = row.length - 1; j > 0; j--) {
            if (row[j] === row[j - 1]) {
              row[j] *= 2;
              score += row[j];
              row.splice(j - 1, 1);
            }
          }
          while (row.length < 4) row.unshift(0);
          if (newGrid[i].join(',') !== row.join(',')) moved = true;
          newGrid[i] = row;
        }
      } else if (direction === 'up') {
        for (let j = 0; j < 4; j++) {
          let col = [];
          for (let i = 0; i < 4; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
          for (let i = 0; i < col.length - 1; i++) {
            if (col[i] === col[i + 1]) {
              col[i] *= 2;
              score += col[i];
              col.splice(i + 1, 1);
            }
          }
          while (col.length < 4) col.push(0);
          for (let i = 0; i < 4; i++) {
            if (newGrid[i][j] !== col[i]) moved = true;
            newGrid[i][j] = col[i];
          }
        }
      } else if (direction === 'down') {
        for (let j = 0; j < 4; j++) {
          let col = [];
          for (let i = 0; i < 4; i++) if (newGrid[i][j] !== 0) col.push(newGrid[i][j]);
          for (let i = col.length - 1; i > 0; i--) {
            if (col[i] === col[i - 1]) {
              col[i] *= 2;
              score += col[i];
              col.splice(i - 1, 1);
            }
          }
          while (col.length < 4) col.unshift(0);
          for (let i = 0; i < 4; i++) {
            if (newGrid[i][j] !== col[i]) moved = true;
            newGrid[i][j] = col[i];
          }
        }
      }
      
      if (moved) {
        grid = newGrid;
        addRandomTile();
        render();
        
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('best2048', bestScore);
          document.getElementById('best-score').textContent = bestScore;
        }
        
        checkGameOver();
      }
    }
    
    function checkGameOver() {
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          if (grid[i][j] === 0) return;
          if (i < 3 && grid[i][j] === grid[i + 1][j]) return;
          if (j < 3 && grid[i][j] === grid[i][j + 1]) return;
        }
      }
      gameOver = true;
      document.getElementById('message-text').textContent = '游戏结束!';
      document.getElementById('game-message').classList.add('active');
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') move('left');
      else if (e.key === 'ArrowRight') move('right');
      else if (e.key === 'ArrowUp') move('up');
      else if (e.key === 'ArrowDown') move('down');
    });
    
    let touchStartX, touchStartY;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) move('right');
        else if (dx < -30) move('left');
      } else {
        if (dy > 30) move('down');
        else if (dy < -30) move('up');
      }
    });
    
    initGame();
  </script>
</body>
</html>
