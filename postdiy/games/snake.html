<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 - 闪喵游戏中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 { color: #eee; margin-bottom: 20px; }
    #game { border: 2px solid #4a4a6a; background: #16213e; }
    .score { color: #eee; margin-top: 10px; font-size: 18px; }
    .instructions { color: #888; margin-top: 20px; font-size: 14px; }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #4a4a6a;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← 返回</a>
  <h1>贪吃蛇</h1>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="score">分数: <span id="score">0</span></div>
  <p class="instructions">使用方向键或滑动屏幕控制</p>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 0, dy = 0;
    let score = 0;
    
    function draw() {
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#e94560';
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
      
      ctx.fillStyle = '#0f3460';
      snake.forEach(segment => {
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
      });
    }
    
    function update() {
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        resetGame();
        return;
      }
      
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          resetGame();
          return;
        }
      }
      
      snake.unshift(head);
      
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
    }
    
    function placeFood() {
      food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };
    }
    
    function resetGame() {
      snake = [{x: 10, y: 10}];
      dx = 0; dy = 0;
      score = 0;
      document.getElementById('score').textContent = score;
      placeFood();
    }
    
    function gameLoop() {
      update();
      draw();
      setTimeout(gameLoop, 100);
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
      else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
      else if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
      else if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
    });
    
    let touchStartX, touchStartY;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    document.addEventListener('touchend', (e) => {
      const dxTouch = e.changedTouches[0].clientX - touchStartX;
      const dyTouch = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dxTouch) > Math.abs(dyTouch)) {
        if (dxTouch > 30 && dx !== -1) { dx = 1; dy = 0; }
        else if (dxTouch < -30 && dx !== 1) { dx = -1; dy = 0; }
      } else {
        if (dyTouch > 30 && dy !== -1) { dx = 0; dy = 1; }
        else if (dyTouch < -30 && dy !== 1) { dx = 0; dy = -1; }
      }
    });
    
    gameLoop();
  </script>
</body>
</html>
