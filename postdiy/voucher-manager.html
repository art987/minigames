<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP激活码管理</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .header .btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .header .btn:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }
    
    .filters {
      padding: 20px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }
    
    .filter-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .filter-group label {
      font-weight: 600;
      color: #495057;
      font-size: 14px;
    }
    
    .filter-group select, .filter-group input {
      padding: 10px 15px;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      font-size: 14px;
      min-width: 150px;
    }
    
    .filter-group select:focus, .filter-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    
    .btn-success {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-success:hover {
      background: #218838;
      transform: translateY(-2px);
    }
    
    .table-container {
      overflow-x: auto;
      padding: 30px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    thead {
      background: #f8f9fa;
    }
    
    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #495057;
      border-bottom: 2px solid #dee2e6;
    }
    
    td {
      padding: 12px 15px;
      border-bottom: 1px solid #e9ecef;
      color: #212529;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .status-badge {
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-unused {
      background: #d4edda;
      color: #155724;
    }
    
    .status-used {
      background: #f8d7da;
      color: #721c24;
    }
    
    .page-info {
      padding: 20px 30px;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .page-info .info {
      color: #495057;
      font-size: 14px;
    }
    
    .pagination {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .pagination button {
      padding: 8px 15px;
      border: 1px solid #dee2e6;
      background: white;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .pagination button:hover:not(:disabled) {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .pagination input {
      width: 60px;
      padding: 8px;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      text-align: center;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 10px;
      padding: 30px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-header h2 {
      font-size: 20px;
      color: #495057;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #6c757d;
    }
    
    .generate-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .generate-form label {
      font-weight: 600;
      color: #495057;
      font-size: 14px;
    }
    
    .generate-form select {
      padding: 12px;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      font-size: 14px;
    }
    
    .generate-form input[type="number"] {
      padding: 12px;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      font-size: 14px;
    }
    
    .generate-form .btn {
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .generate-form .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .generate-form .btn-primary:hover {
      background: #5568d3;
    }
    
    .generate-form .btn-secondary {
      background: #6c757d;
      color: white;
    }
    
    .generate-form .btn-secondary:hover {
      background: #5a6268;
    }
    
    .generate-results {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 5px;
    }
    
    .generate-results h3 {
      font-size: 16px;
      color: #495057;
      margin-bottom: 10px;
    }
    
    .generate-results .result-item {
      padding: 10px;
      background: white;
      border-radius: 5px;
      margin-bottom: 8px;
      border-left: 4px solid #667eea;
    }
    
    .generate-results .result-item .code {
      font-family: 'Courier New', monospace;
      font-weight: 600;
      color: #667eea;
      font-size: 16px;
    }
    
    .generate-results .result-item .details {
      font-size: 12px;
      color: #6c757d;
      margin-top: 5px;
    }
    
    .generate-results .result-item .status {
      font-size: 12px;
      color: #28a745;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6c757d;
    }
    
    .empty-state i {
      font-size: 60px;
      margin-bottom: 20px;
      color: #dee2e6;
    }
    
    .empty-state h3 {
      font-size: 18px;
      color: #495057;
      margin-bottom: 10px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }
    
    .loading i {
      font-size: 30px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fa fa-ticket"></i> VIP激活码管理</h1>
      <button class="btn" onclick="showGenerateModal()">
        <i class="fa fa-plus"></i> 批量生成激活码
      </button>
    </div>
    
    <div class="filters">
      <div class="filter-row">
        <div class="filter-group">
          <label>状态</label>
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="unused">未使用</option>
            <option value="used">已使用</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>时长</label>
          <select id="durationFilter">
            <option value="all">全部时长</option>
            <option value="1">1个月</option>
            <option value="3">3个月</option>
            <option value="6">6个月</option>
            <option value="12">1年</option>
            <option value="24">2年</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>搜索</label>
          <input type="text" id="searchInput" placeholder="输入激活码或用户ID">
        </div>
        
        <button class="btn-primary" onclick="loadVouchers()">
          <i class="fa fa-search"></i> 查询
        </button>
      </div>
    </div>
    
    <div class="table-container">
      <table id="vouchersTable">
        <thead>
          <tr>
            <th>激活码</th>
            <th>状态</th>
            <th>创建时间</th>
            <th>VIP时长</th>
            <th>激活时间</th>
            <th>激活ID</th>
            <th>有效起止时间</th>
          </tr>
        </thead>
        <tbody id="vouchersBody">
          <tr>
            <td colspan="7" class="loading">
              <i class="fa fa-spinner fa-spin"></i> 加载中...
            </td>
          </tr>
        </tbody>
      </table>
      
      <div id="emptyState" class="empty-state hidden">
        <i class="fa fa-ticket"></i>
        <h3>暂无激活码数据</h3>
        <p>请先生成激活码或调整筛选条件</p>
      </div>
    </div>
    
    <div class="page-info">
      <div class="info">
        <span id="totalCount">0</span> 条记录
      </div>
      <div class="pagination">
        <button onclick="prevPage()" id="prevBtn"><i class="fa fa-chevron-left"></i></button>
        <span>第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页</span>
        <button onclick="nextPage()" id="nextBtn"><i class="fa fa-chevron-right"></i></button>
      </div>
    </div>
  </div>
  
  <!-- 生成激活码弹窗 -->
  <div class="modal" id="generateModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>批量生成激活码</h2>
        <button class="modal-close" onclick="closeGenerateModal()">&times;</button>
      </div>
      
      <div class="generate-form">
        <div class="form-group">
          <label>时长类型</label>
          <select id="generateDuration">
            <option value="1">1个月</option>
            <option value="3">3个月</option>
            <option value="6">6个月</option>
            <option value="12">1年</option>
            <option value="24">2年</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>生成数量</label>
          <input type="number" id="generateCount" value="50" min="1" max="100">
        </div>
        
        <div class="form-actions">
          <button class="btn btn-primary" onclick="generateVouchers()">
            <i class="fa fa-plus"></i> 开始生成
          </button>
          <button class="btn btn-secondary" onclick="closeGenerateModal()">
            <i class="fa fa-times"></i> 取消
          </button>
        </div>
      </div>
      
      <div id="generateResults" class="generate-results hidden">
        <h3>生成结果</h3>
        <div id="resultsList"></div>
      </div>
    </div>
  </div>
  
  <script>
    // 全局状态
    let vouchers = [];
    let currentPage = 1;
    const pageSize = 20;
    let currentFilter = {
      status: 'all',
      duration: 'all',
      search: ''
    };
    
    // 加载激活码列表
    async function loadVouchers() {
      currentFilter = {
        status: document.getElementById('statusFilter').value,
        duration: document.getElementById('durationFilter').value,
        search: document.getElementById('searchInput').value.trim()
      };
      
      currentPage = 1;
      showLoading();
      
      try {
        const response = await fetch('https://api.peacelove.top/voucher-list', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            page: currentPage,
            limit: pageSize,
            status: currentFilter.status,
            duration: currentFilter.duration === 'all' ? null : parseInt(currentFilter.duration),
            search: currentFilter.search
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          vouchers = result.data.list;
          renderTable();
          updatePagination(result.data.total);
        } else {
          showError('加载失败: ' + result.message);
        }
      } catch (error) {
        console.error('加载激活码失败:', error);
        showError('网络错误，请重试');
      }
    }
    
    // 渲染表格
    function renderTable() {
      const tbody = document.getElementById('vouchersBody');
      
      if (vouchers.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        tbody.innerHTML = '';
        return;
      }
      
      document.getElementById('emptyState').classList.add('hidden');
      
      tbody.innerHTML = vouchers.map(voucher => {
        const statusClass = voucher.used ? 'status-used' : 'status-unused';
        const statusText = voucher.used ? '已使用' : '未使用';
        const usedAt = voucher.usedAt ? formatDateTime(voucher.usedAt) : '-';
        const usedBy = voucher.usedBy || '-';
        const validFrom = formatDateTime(voucher.createdAt);
        const validUntil = formatDateTime(voucher.validUntil);
        
        return `
          <tr>
            <td><code>${voucher.code}</code></td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>${formatDateTime(voucher.createdAt)}</td>
            <td>${voucher.durationName}</td>
            <td>${usedAt}</td>
            <td>${usedBy}</td>
            <td>${validFrom} 至 ${validUntil}</td>
          </tr>
        `;
      }).join('');
    }
    
    // 更新分页
    function updatePagination(total) {
      const totalPages = Math.ceil(total / pageSize);
      document.getElementById('totalCount').textContent = total;
      document.getElementById('currentPage').textContent = currentPage;
      document.getElementById('totalPages').textContent = totalPages;
      
      document.getElementById('prevBtn').disabled = currentPage === 1;
      document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }
    
    // 上一页
    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        loadVouchers();
      }
    }
    
    // 下一页
    function nextPage() {
      const totalPages = Math.ceil(document.getElementById('totalCount').textContent / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        loadVouchers();
      }
    }
    
    // 显示加载状态
    function showLoading() {
      document.getElementById('vouchersBody').innerHTML = `
        <tr>
          <td colspan="7" class="loading">
            <i class="fa fa-spinner fa-spin"></i> 加载中...
          </td>
        </tr>
      `;
      document.getElementById('emptyState').classList.add('hidden');
    }
    
    // 显示错误
    function showError(message) {
      document.getElementById('vouchersBody').innerHTML = `
        <tr>
          <td colspan="7" class="error" style="color: #dc3545; text-align: center;">
            ${message}
          </td>
        </tr>
      `;
    }
    
    // 格式化日期时间
    function formatDateTime(dateString) {
      if (!dateString) return '-';
      
      const date = new Date(dateString);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }
    
    // 显示生成弹窗
    function showGenerateModal() {
      document.getElementById('generateModal').classList.add('active');
      document.getElementById('generateResults').classList.add('hidden');
      document.getElementById('resultsList').innerHTML = '';
    }
    
    // 关闭生成弹窗
    function closeGenerateModal() {
      document.getElementById('generateModal').classList.remove('active');
    }
    
    // 生成激活码
    async function generateVouchers() {
      const duration = parseInt(document.getElementById('generateDuration').value);
      const count = parseInt(document.getElementById('generateCount').value);
      
      if (count < 1 || count > 100) {
        alert('生成数量必须在1-100之间');
        return;
      }
      
      const btn = document.querySelector('#generateModal .btn-primary');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 生成中...';
      
      try {
        const response = await fetch('https://api.peacelove.top/user-generate-voucher', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            duration: duration,
            durationName: getDurationName(duration),
            count: count
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          const resultsList = document.getElementById('resultsList');
          resultsList.innerHTML = result.codes.map(code => `
            <div class="result-item">
              <div class="code">${code}</div>
              <div class="details">时长: ${getDurationName(duration)} | 创建时间: ${formatDateTime(new Date())}</div>
              <div class="status">✓ 生成成功</div>
            </div>
          `).join('');
          
          document.getElementById('generateResults').classList.remove('hidden');
          alert(`成功生成 ${count} 个激活码`);
        } else {
          alert('生成失败: ' + (result.message || '未知错误'));
        }
      } catch (error) {
        console.error('生成激活码失败:', error);
        alert('网络错误，请重试');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-plus"></i> 开始生成';
      }
    }
    
    // 获取时长名称
    function getDurationName(duration) {
      const durations = {
        1: '1个月',
        3: '3个月',
        6: '6个月',
        12: '1年',
        24: '2年'
      };
      return durations[duration] || '未知';
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      loadVouchers();
    });
  </script>
</body>
</html>
