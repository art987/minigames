<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP激活码管理</title>
    <!-- SVG图标库 - 本地SVG图标（无需字体文件，适用于WebView） -->
    <link rel="stylesheet" href="libs/svg-icons/svg-icons.css">
    <script src="libs/svg-icons/svg-icons.js"></script>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa fa-ticket"></i> VIP激活码管理</h1>
            <button class="btn logout-btn" id="logoutBtn" style="display: none;" onclick="logout()">
                <i class="fa fa-sign-out"></i> 退出登录
            </button>
        </div>
        
        <div class="login-section" id="loginSection">
            <div class="error-message" id="loginError"></div>
            <h2>管理员登录</h2>
            <div class="form-group">
                <label for="userId">用户ID</label>
                <input type="text" id="userId" placeholder="请输入用户ID" value="15160029349">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn" id="loginBtn" onclick="login()" style="width: 100%;">
                <i class="fa fa-sign-in"></i> 登录
            </button>
        </div>
        
        <div class="manage-content" id="manageSection">
            <div class="stats-row" id="statsRow">
                <div class="stat-item">
                    <i class="fa fa-ticket"></i>
                    <div>
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">总激活码</div>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fa fa-check-circle" style="color: #28a745;"></i>
                    <div>
                        <div class="stat-value" id="unusedCount">0</div>
                        <div class="stat-label">未使用</div>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fa fa-check" style="color: #dc3545;"></i>
                    <div>
                        <div class="stat-value" id="usedCount">0</div>
                        <div class="stat-label">已使用</div>
                    </div>
                </div>
            </div>
            
            <div class="filters">
                <div class="filter-row filter-inputs">
                    <select id="statusFilter" onchange="loadVouchers()">
                        <option value="all">全部状态</option>
                        <option value="unused">未使用</option>
                        <option value="used">已使用</option>
                    </select>
                    
                    <select id="durationFilter" onchange="loadVouchers()">
                        <option value="all">全部时长</option>
                        <option value="1">1个月</option>
                        <option value="3">3个月</option>
                        <option value="6">6个月</option>
                        <option value="12">1年</option>
                        <option value="24">2年</option>
                    </select>
                    
                    <select id="exportedFilter" onchange="loadVouchers()">
                        <option value="all">全部导出</option>
                        <option value="unexported">未导出</option>
                        <option value="exported">已导出</option>
                    </select>
                    
                    <input type="text" id="searchInput" placeholder="输入激活码或用户手机号" oninput="debounceSearch()">
                </div>
                
                <div class="filter-row filter-buttons">
                    <button class="btn" onclick="loadVouchers()">
                        <i class="fa fa-search"></i> 查询
                    </button>
                    
                    <button class="btn btn-success" onclick="showGenerateModal()">
                        <i class="fa fa-plus"></i> 批量生成
                    </button>
                    
                    <button class="btn btn-export" onclick="showExportModal()">
                        <i class="fa fa-download"></i> 批量导出
                    </button>
                </div>
            </div>
            
            <div class="table-container">
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fa fa-ticket"></i>
                    <h3>暂无激活码数据</h3>
                    <p>请先生成激活码或调整筛选条件</p>
                </div>
                <div class="cards-grid" id="vouchersGrid">
                    <div class="loading">
                        <i class="fa fa-spinner fa-spin"></i> 加载中...
                    </div>
                </div>
            </div>
            
            <div class="page-info">
                <div class="info">
                    共 <span id="totalRecords">0</span> 条记录
                </div>
                <div class="pagination">
                    <button onclick="prevPage()" id="prevBtn"><i class="fa fa-chevron-left"></i></button>
                    <span>第 <input type="number" id="pageInput" value="1" min="1" onchange="goToPage()"> / <span id="totalPages">1</span> 页</span>
                    <button onclick="nextPage()" id="nextBtn"><i class="fa fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>
    
    <button class="log-float-btn" id="logFloatBtn" style="display: none;" onclick="showLogModal()">
        <i class="fa fa-terminal"></i>
    </button>
    
    <div class="log-modal" id="logModal">
        <div class="log-modal-content">
            <div class="log-modal-header">
                <h3><i class="fa fa-terminal"></i> 运行日志</h3>
                <div>
                    <button class="btn btn-secondary" onclick="clearLog()">
                        <i class="fa fa-trash"></i> 清空
                    </button>
                    <button class="btn btn-secondary" onclick="copyLog()">
                        <i class="fa fa-copy"></i> 复制
                    </button>
                    <button class="btn btn-secondary" onclick="closeLogModal()">
                        <i class="fa fa-times"></i> 关闭
                    </button>
                </div>
            </div>
            <div class="log-modal-body" id="logContent">
                <div class="log-entry"><span class="log-time">[系统就绪]</span> <span class="log-info">等待操作...</span></div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="generateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>批量生成激活码</h2>
                <button class="modal-close" onclick="closeGenerateModal()">&times;</button>
            </div>
            
            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>
            
            <div class="generate-form">
                <div class="form-group">
                    <label>时长类型</label>
                    <select id="generateDuration">
                        <option value="1">1个月</option>
                        <option value="3">3个月</option>
                        <option value="6">6个月</option>
                        <option value="12">1年</option>
                        <option value="24">2年</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>生成数量</label>
                    <input type="number" id="generateCount" value="50" min="1" max="100">
                </div>
                
                <div class="form-actions">
                    <button class="btn btn-success" onclick="generateVouchers()">
                        <i class="fa fa-plus"></i> 开始生成
                    </button>
                    <button class="btn btn-secondary" onclick="closeGenerateModal()">
                        <i class="fa fa-times"></i> 取消
                    </button>
                </div>
            </div>
            
            <div id="generateResults" class="generate-results" style="display: none;">
                <h3>生成结果</h3>
                <div id="resultsList"></div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="exportModal">
        <div class="modal-content export-modal-content">
            <div class="modal-header">
                <h2><i class="fa fa-download"></i> 批量导出激活码</h2>
                <button class="modal-close" onclick="closeExportModal()">&times;</button>
            </div>
            
            <div class="success-message" id="exportSuccessMessage"></div>
            <div class="error-message" id="exportErrorMessage"></div>
            
            <div class="export-form">
                <div class="form-row three-col">
                    <div class="form-group">
                        <label>时长类型</label>
                        <select id="exportDuration">
                            <option value="all">全部时长</option>
                            <option value="1">1个月</option>
                            <option value="3">3个月</option>
                            <option value="6">6个月</option>
                            <option value="12">1年</option>
                            <option value="24">2年</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>导出数量</label>
                        <div class="number-input-wrapper">
                            <button type="button" class="number-btn minus" onclick="adjustExportCount(-1)">-</button>
                            <input type="number" id="exportCount" value="500" min="1" max="10000" onchange="validateExportCount()">
                            <button type="button" class="number-btn plus" onclick="adjustExportCount(1)">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>使用状态</label>
                        <div class="radio-group compact">
                            <label class="radio-item"><input type="radio" name="exportStatus" value="all"><span>全部</span></label>
                            <label class="radio-item"><input type="radio" name="exportStatus" value="unused" checked><span>未使用</span></label>
                            <label class="radio-item"><input type="radio" name="exportStatus" value="used"><span>已使用</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>导出状态</label>
                        <div class="radio-group compact">
                            <label class="radio-item"><input type="radio" name="exportExported" value="all"><span>全部</span></label>
                            <label class="radio-item"><input type="radio" name="exportExported" value="exported"><span>已导出</span></label>
                            <label class="radio-item"><input type="radio" name="exportExported" value="unexported" checked><span>未导出</span></label>
                        </div>
                    </div>
                </div>
                
                <div class="export-warning" id="exportWarning" style="display: none;">
                    <i class="fa fa-exclamation-triangle"></i>
                    <span>导出数量超过1000条，处理时间可能较长</span>
                </div>
                
                <div class="export-progress" id="exportProgress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">准备导出...</div>
                </div>
                
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="closeExportModal()">
                        <i class="fa fa-times"></i> 取消
                    </button>
                    <button class="btn btn-export" id="confirmExportBtn" onclick="confirmExport()">
                        <i class="fa fa-download"></i> 确认导出
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const ADMIN_USER_ID = '15160029349';
        const ADMIN_PASSWORD = '123456';
        
        let vouchers = [];
        let currentPage = 1;
        const pageSize = 20;
        let searchTimeout = null;
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleString('zh-CN');
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${timestamp}]</span> <span class="log-${type}">${message}</span>`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }
        
        function showLogModal() {
            document.getElementById('logModal').classList.add('active');
        }
        
        function closeLogModal() {
            document.getElementById('logModal').classList.remove('active');
        }
        
        function showMessage(elementId, message, isError = true) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = message;
                el.className = isError ? 'error-message show' : 'success-message show';
                setTimeout(() => {
                    el.className = isError ? 'error-message' : 'success-message';
                }, 3000);
            }
        }
        
        function login() {
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();
            
            log('开始登录验证...');
            log(`用户ID: ${userId}`);
            
            if (!userId || !password) {
                log('错误：请输入用户ID和密码', 'error');
                showMessage('loginError', '请输入用户ID和密码');
                return;
            }
            
            if (userId !== ADMIN_USER_ID) {
                log('错误：无权限访问', 'error');
                showMessage('loginError', '无权限访问此系统');
                return;
            }
            
            if (password !== ADMIN_PASSWORD) {
                log('错误：密码错误', 'error');
                showMessage('loginError', '密码错误');
                return;
            }
            
            log('登录成功');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('manageSection').classList.add('active');
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('logFloatBtn').style.display = 'flex';
            
            log('加载激活码列表...');
            loadVouchers();
        }
        
        function logout() {
            log('用户退出登录');
            document.getElementById('manageSection').classList.remove('active');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('logFloatBtn').style.display = 'none';
            document.getElementById('password').value = '';
            clearLog();
        }
        
        function clearLog() {
            document.getElementById('logContent').innerHTML = '<div class="log-entry"><span class="log-time">[已清空]</span> <span class="log-info">日志已清空</span></div>';
        }
        
        function copyLog() {
            const logContent = document.getElementById('logContent').innerText;
            navigator.clipboard.writeText(logContent).then(() => {
                log('日志已复制到剪贴板');
            }).catch(err => {
                log('复制失败: ' + err.message, 'error');
            });
        }
        
        async function loadVouchers() {
            currentPage = 1;
            const status = document.getElementById('statusFilter').value;
            const duration = document.getElementById('durationFilter').value;
            const exported = document.getElementById('exportedFilter').value;
            const search = document.getElementById('searchInput').value.trim();
            
            log(`加载数据: 页码=${currentPage}, 状态=${status}, 时长=${duration}, 导出=${exported}, 搜索=${search || '无'}`);
            
            showLoading();
            
            try {
                const response = await fetch('https://api.peacelove.top/user-voucher-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        page: currentPage,
                        limit: pageSize,
                        status: status,
                        duration: duration === 'all' ? null : parseInt(duration),
                        exported: exported,
                        search: search
                    })
                });
                
                let result = await response.json();
                if (result.body && typeof result.body === 'string') {
                    result = JSON.parse(result.body);
                }
                log(`响应: ${result.success ? '成功' : '失败'} - ${result.message || ''}`);
                
                if (result.success && result.data) {
                    vouchers = result.data.list || [];
                    renderTable();
                    updatePagination(result.data.total || 0);
                    updateStats(result.data.stats);
                } else {
                    showMessage('errorMessage', '加载失败: ' + (result.message || '未知错误'));
                    log('加载失败: ' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                log('网络错误: ' + error.message, 'error');
                showMessage('errorMessage', '网络错误，请重试');
            }
        }
        
        function updateStats(stats) {
            if (stats) {
                document.getElementById('totalCount').textContent = stats.total || 0;
                document.getElementById('unusedCount').textContent = stats.unused || 0;
                document.getElementById('usedCount').textContent = stats.used || 0;
            }
        }
        
        function renderTable() {
            const grid = document.getElementById('vouchersGrid');
            
            if (!vouchers || vouchers.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                grid.innerHTML = '';
                return;
            }
            
            document.getElementById('emptyState').style.display = 'none';
            
            grid.innerHTML = vouchers.map(voucher => {
                const statusClass = voucher.used ? 'used' : 'unused';
                const statusText = voucher.used ? '已使用' : '未使用';
                const exportClass = voucher.exported ? 'exported' : 'unexported';
                const exportText = voucher.exported ? '已导出' : '未导出';
                const usedAt = voucher.usedAt ? formatDateTime(voucher.usedAt) : '-';
                const usedByPhone = voucher.usedByPhone || '-';
                let usedByName = voucher.usedByName || '-';
                
                if (usedByName === '-' && voucher.usedBy) {
                    usedByName = voucher.brandname || voucher.brandName || `用户ID: ${voucher.usedBy}`;
                }
                
                const createdAt = formatDateTime(voucher.createdAt);
                const validUntil = voucher.validUntil ? formatDateTime(voucher.validUntil) : '-';
                
                return `
                    <div class="voucher-card ${statusClass}">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        <span class="export-badge ${exportClass}">${exportText}</span>
                        <div class="card-columns">
                            <div class="card-column">
                                <div class="card-field">
                                    <span class="field-label">VIP时长</span>
                                    <span class="field-value duration">${voucher.durationName || '-'}</span>
                                </div>
                                <div class="card-field">
                                    <span class="field-label">激活码</span>
                                    <span class="field-value code">${voucher.code || '-'}</span>
                                    <button class="copy-btn-inline" onclick="copyVoucherCode('${voucher.code}', '${voucher.durationName}', this)">
                                        <i class="fa fa-copy"></i> 复制
                                    </button>
                                </div>
                                <div class="card-field">
                                    <span class="field-label">创建时间</span>
                                    <span class="field-value">${createdAt}</span>
                                </div>
                            </div>
                            <div class="card-column">
                                <div class="card-field">
                                    <span class="field-label">激活用户</span>
                                    <span class="field-value phone">${usedByPhone}</span>
                                </div>
                                <div class="card-field">
                                    <span class="field-label">商家名称</span>
                                    <span class="field-value">${usedByName}</span>
                                </div>
                                <div class="card-field">
                                    <span class="field-label">激活时间</span>
                                    <span class="field-value">${usedAt}</span>
                                </div>
                                <div class="card-field">
                                    <span class="field-label">有效期至</span>
                                    <span class="field-value">${validUntil}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function copyVoucherCode(code, durationName, btn) {
            const text = `激活码：${code}\n时长：${durationName}`;
            navigator.clipboard.writeText(text).then(() => {
                log('激活码已复制到剪贴板');
                
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fa fa-check"></i> 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                log('复制失败: ' + err.message, 'error');
            });
        }
        
        function updatePagination(total) {
            const totalPages = Math.ceil(total / pageSize) || 1;
            document.getElementById('totalRecords').textContent = total;
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('pageInput').value = currentPage;
            document.getElementById('pageInput').max = totalPages;
            
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadVouchersWithPage();
            }
        }
        
        function nextPage() {
            const totalPages = parseInt(document.getElementById('totalPages').textContent);
            if (currentPage < totalPages) {
                currentPage++;
                loadVouchersWithPage();
            }
        }
        
        function goToPage() {
            const totalPages = parseInt(document.getElementById('totalPages').textContent);
            const page = parseInt(document.getElementById('pageInput').value);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                loadVouchersWithPage();
            } else {
                document.getElementById('pageInput').value = currentPage;
            }
        }
        
        async function loadVouchersWithPage() {
            const status = document.getElementById('statusFilter').value;
            const duration = document.getElementById('durationFilter').value;
            const search = document.getElementById('searchInput').value.trim();
            
            log(`加载数据: 页码=${currentPage}`);
            showLoading();
            
            try {
                const response = await fetch('https://api.peacelove.top/user-voucher-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        page: currentPage,
                        limit: pageSize,
                        status: status,
                        duration: duration === 'all' ? null : parseInt(duration),
                        search: search
                    })
                });
                
                let result = await response.json();
                if (result.body && typeof result.body === 'string') {
                    result = JSON.parse(result.body);
                }
                
                if (result.success && result.data) {
                    vouchers = result.data.list || [];
                    renderTable();
                    updatePagination(result.data.total || 0);
                } else {
                    showMessage('errorMessage', '加载失败: ' + (result.message || '未知错误'));
                }
            } catch (error) {
                log('网络错误: ' + error.message, 'error');
                showMessage('errorMessage', '网络错误，请重试');
            }
        }
        
        function showLoading() {
            document.getElementById('vouchersGrid').innerHTML = `
                <div class="loading">
                    <i class="fa fa-spinner fa-spin"></i> 加载中...
                </div>
            `;
        }
        
        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
        
        function showGenerateModal() {
            document.getElementById('generateModal').classList.add('active');
            document.getElementById('generateResults').style.display = 'none';
            document.getElementById('resultsList').innerHTML = '';
            document.getElementById('successMessage').className = 'success-message';
            document.getElementById('errorMessage').className = 'error-message';
        }
        
        function closeGenerateModal() {
            document.getElementById('generateModal').classList.remove('active');
        }
        
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadVouchers();
            }, 500);
        }
        
        async function generateVouchers() {
            const duration = parseInt(document.getElementById('generateDuration').value);
            const count = parseInt(document.getElementById('generateCount').value);
            
            log(`开始生成激活码: 时长=${duration}个月, 数量=${count}`);
            
            if (count < 1 || count > 100) {
                log('错误：生成数量必须在1-100之间', 'error');
                showMessage('errorMessage', '生成数量必须在1-100之间');
                return;
            }
            
            const btn = document.querySelector('#generateModal .btn-success');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 生成中...';
            
            try {
                const response = await fetch('https://api.peacelove.top/user-generate-voucher', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        duration: duration,
                        durationName: getDurationName(duration),
                        count: count
                    })
                });
                
                let result = await response.json();
                if (result.body && typeof result.body === 'string') {
                    result = JSON.parse(result.body);
                }
                log(`生成响应: ${result.success ? '成功' : '失败'} - ${result.message || ''}`);
                
                if (result.success && result.codes) {
                    const resultsList = document.getElementById('resultsList');
                    resultsList.innerHTML = result.codes.slice(0, 10).map(code => `
                        <div class="result-item">
                            <div class="code">${code}</div>
                            <div class="details">时长: ${getDurationName(duration)} | 创建时间: ${formatDateTime(new Date())}</div>
                            <div class="status">✓ 生成成功</div>
                        </div>
                    `).join('');
                    
                    if (result.codes.length > 10) {
                        resultsList.innerHTML += `<div class="result-item">... 还有 ${result.codes.length - 10} 个激活码</div>`;
                    }
                    
                    document.getElementById('generateResults').style.display = 'block';
                    showMessage('successMessage', `成功生成 ${count} 个激活码`, false);
                    log(`成功生成 ${count} 个激活码`);
                    
                    setTimeout(() => {
                        closeGenerateModal();
                        loadVouchers();
                    }, 2000);
                } else {
                    showMessage('errorMessage', '生成失败: ' + (result.message || '未知错误'));
                    log('生成失败: ' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                log('网络错误: ' + error.message, 'error');
                showMessage('errorMessage', '网络错误，请重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-plus"></i> 开始生成';
            }
        }
        
        function getDurationName(duration) {
            const durations = { 1: '1个月', 3: '3个月', 6: '6个月', 12: '1年', 24: '2年' };
            return durations[duration] || '未知';
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        
        document.getElementById('logModal').addEventListener('click', function(e) {
            if (e.target === this) closeLogModal();
        });
        
        function showExportModal() {
            document.getElementById('exportModal').classList.add('active');
            document.getElementById('exportSuccessMessage').className = 'success-message';
            document.getElementById('exportErrorMessage').className = 'error-message';
            document.getElementById('exportProgress').style.display = 'none';
            document.getElementById('exportWarning').style.display = 'none';
            validateExportCount();
        }
        
        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('active');
        }
        
        function adjustExportCount(delta) {
            const input = document.getElementById('exportCount');
            let value = parseInt(input.value) || 1;
            value = Math.max(1, Math.min(10000, value + delta));
            input.value = value;
            validateExportCount();
        }
        
        function validateExportCount() {
            const input = document.getElementById('exportCount');
            let value = parseInt(input.value) || 1;
            
            if (value < 1) value = 1;
            if (value > 10000) value = 10000;
            input.value = value;
            
            const warning = document.getElementById('exportWarning');
            if (value > 1000) {
                warning.style.display = 'flex';
            } else {
                warning.style.display = 'none';
            }
        }
        
        async function confirmExport() {
            const duration = document.getElementById('exportDuration').value;
            const status = document.querySelector('input[name="exportStatus"]:checked').value;
            const exported = document.querySelector('input[name="exportExported"]:checked').value;
            const count = parseInt(document.getElementById('exportCount').value);
            
            log(`开始导出激活码: 时长=${duration}, 状态=${status}, 导出状态=${exported}, 数量=${count}`);
            
            if (count < 1 || count > 10000) {
                log('错误：导出数量必须在1-10000之间', 'error');
                showMessage('exportErrorMessage', '导出数量必须在1-10000之间');
                return;
            }
            
            const btn = document.getElementById('confirmExportBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 导出中...';
            
            const progressDiv = document.getElementById('exportProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressDiv.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = '正在查询数据...';
            
            try {
                progressFill.style.width = '20%';
                progressText.textContent = '正在获取激活码列表...';
                
                const response = await fetch('https://api.peacelove.top/user-export-vouchers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        duration: duration === 'all' ? null : parseInt(duration),
                        status: status,
                        exported: exported,
                        limit: count
                    })
                });
                
                let result = await response.json();
                if (result.body && typeof result.body === 'string') {
                    result = JSON.parse(result.body);
                }
                log(`导出响应: ${result.success ? '成功' : '失败'} - ${result.message || ''}`);
                
                if (result.success && result.data && result.data.length > 0) {
                    progressFill.style.width = '60%';
                    progressText.textContent = '正在生成文件...';
                    
                    const csvContent = generateCSV(result.data);
                    
                    progressFill.style.width = '80%';
                    progressText.textContent = '正在下载...';
                    
                    downloadCSV(csvContent, `激活码导出_${new Date().toISOString().slice(0,10)}.csv`);
                    
                    progressFill.style.width = '100%';
                    progressText.textContent = '导出完成！';
                    
                    showMessage('exportSuccessMessage', `成功导出 ${result.data.length} 个激活码`, false);
                    log(`成功导出 ${result.data.length} 个激活码`);
                    
                    setTimeout(() => {
                        closeExportModal();
                        loadVouchers();
                    }, 1500);
                } else if (result.success && result.data && result.data.length === 0) {
                    showMessage('exportErrorMessage', '没有找到符合条件的激活码');
                    log('没有找到符合条件的激活码', 'warn');
                    progressDiv.style.display = 'none';
                } else {
                    showMessage('exportErrorMessage', '导出失败: ' + (result.message || '未知错误'));
                    log('导出失败: ' + (result.message || '未知错误'), 'error');
                    progressDiv.style.display = 'none';
                }
            } catch (error) {
                log('网络错误: ' + error.message, 'error');
                showMessage('exportErrorMessage', '网络错误，请重试');
                progressDiv.style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-download"></i> 确认导出';
            }
        }
        
        function generateCSV(data) {
            const headers = ['激活码', '时长', '使用状态', '导出状态', '创建时间', '激活用户手机', '商家名称', '激活时间', '有效期至'];
            const rows = [headers.join(',')];
            
            data.forEach(voucher => {
                const row = [
                    voucher.code || '',
                    voucher.durationName || '',
                    voucher.used ? '已使用' : '未使用',
                    voucher.exported ? '已导出' : '未导出',
                    voucher.createdAt ? formatDateTime(voucher.createdAt) : '',
                    voucher.usedByPhone || '',
                    voucher.brandname || voucher.brandName || '',
                    voucher.usedAt ? formatDateTime(voucher.usedAt) : '',
                    voucher.validUntil ? formatDateTime(voucher.validUntil) : ''
                ];
                rows.push(row.map(field => `"${String(field).replace(/"/g, '""')}"`).join(','));
            });
            
            return '\uFEFF' + rows.join('\n');
        }
        
        function downloadCSV(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        document.getElementById('exportModal').addEventListener('click', function(e) {
            if (e.target === this) closeExportModal();
        });
        
        log('VIP激活码管理系统已就绪');
        log('登录信息: 用户ID=15160029349, 密码=admin123');
    </script>
</body>
