<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪喵小知识备忘录</title>
  
  <meta name="description" content="闪喵小知识，汇集生活常识、健康养生、职场技能、人际交往等各类实用知识点，打造您的个人知识备忘录。">
  <meta name="keywords" content="闪喵小知识,生活常识,健康养生,职场技能,人际交往,知识备忘录,实用技巧">
  
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="../libs/font-awesome/css/all.min.css">
  
  <!-- 样式文件 -->
  <link rel="stylesheet" href="knowledge.css">
  
  <!-- 数据文件 -->
  <script src="knowledge-data.js"></script>
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="header-content">
      <!-- Logo -->
      <a href="" class="logo">
        <span class="channel-name">📚 闪喵-小知识备忘录</span>
      </a>
      
      <!-- 搜索框 -->
      <div class="search-container">
        <div class="search-box">
          <i class="fa fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="搜索中...">
          <button class="clear-btn" id="clearBtn" title="清空搜索">
            <i class="fa fa-times"></i>
          </button>
        </div>
        
        <!-- 热搜词 -->
        <div class="hot-searches-container">
          <span class="label">热搜：</span>
          <div class="hot-searches-wrapper">
            <div class="hot-searches" id="hotSearches">
              <!-- 热搜词将通过 JS 动态加载 -->
            </div>
          </div>
          <div class="view-all-btn-wrapper">
            <button class="view-all-btn" id="viewAllBtn">
              全部 <i class="fa fa-th"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>
  
  <!-- 内容区域 -->
  <main class="content-area">
    <!-- 卡片列表 -->
    <div class="cards-container" id="cardsContainer">
      <!-- 卡片将通过 JS 动态加载 -->
    </div>
    
    <!-- 无结果提示 -->
    <div class="no-results" id="noResults" style="display: none;">
      <i class="fa fa-search"></i>
      <p>没有找到匹配的内容，换个关键词试试吧~</p>
    </div>
  </main>
  
  <!-- 返回顶部按钮 -->
  <button class="back-home" id="backToTop" title="返回顶部" style="display: none;">
    <i class="fa fa-arrow-up"></i>
  </button>
  
  <!-- 全部关键词弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>全部关键词</h3>
        <button class="modal-close" id="modalClose">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-tags" id="modalTags">
          <!-- 关键词将通过 JS 动态加载 -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- 交互逻辑 -->
  <script src="knowledge.js"></script>
</body>
</html>
