<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朋友圈海报制作中心 - 在线海报设计工具</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- 整合后的样式文件 -->
  <link rel="stylesheet" href="styles.css">
  <!-- 节日数据 -->
  <script src="festivals.js"></script>
  <!-- 模板数据 - 动态加载防止缓存 -->
  <script>
    // 创建带有时间戳的模板脚本标签，确保每次加载最新版本
    const templateScript = document.createElement('script');
    templateScript.src = 'templates.js?t=' + new Date().getTime();
    document.head.appendChild(templateScript);
  </script>
  <!-- 工具函数 -->
  <script src="utils.js"></script>
  <!-- VIP数据 -->
  <script src="vip_data.js"></script>
</head>
<body>
  <!-- 头部导航 -->
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14h-4V9h4v8zm-2-6h-2v4h2v-4zm4 6h-2v-2h2v2zm0-4h-2v-2h2v2zm4 4h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
        </svg>
        朋友圈海报制作
      </a>
      
      <!-- 用户登录入口 -->
      <div class="user-login-section">
        <!-- 普通用户登录 -->
        <div class="user-auth-section">
          <button id="loginBtn" class="user-login-btn">
            <i class="fa fa-user"></i>
            <span>登录/注册</span>
          </button>
          <div id="userInfo" class="user-info hidden">
            <span id="userEmail"></span>
            <span id="vipBadge" class="vip-badge">VIP</span>
            <button id="logoutBtn" class="user-logout-btn">
              <i class="fa fa-sign-out"></i>
              <span>退出</span>
            </button>
          </div>
        </div>
        
        <!-- VIP登录入口 -->
        <div class="vip-login-section">
          <button id="vipLoginBtn" class="vip-login-btn">
            <i class="fa fa-diamond"></i>
            <span>VIP登录</span>
          </button>
          <div id="vipStatus" class="vip-status hidden">
            <i class="fa fa-check-circle"></i>
            <span>已登录</span>
            <button id="vipLogoutBtn" class="vip-logout-btn">
              <i class="fa fa-sign-out"></i>
              <span>退出</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main>
    <div class="container">
      <!-- 分类导航系统 -->
      

        <!-- 月份导航 -->
        <div class="month-nav">
          <h2 class="month-nav-title" style="display: none;">选择月份模板（<span class="templates-count" id="templatesCount">0 个模板</span>）</h2>
          <div class="month-buttons" id="monthButtons"></div>
        </div>

        <!-- 节日标签 -->
        <div class="festival-tags">
          <div class="festival-tags-container" id="festivalTags"></div>
        </div>
      </div>

      <!-- 模板展示区域 -->
      <div class="templates-section">
        

        <!-- 模板网格布局 -->
        <div class="templates-grid" id="templatesGrid"></div>

        <!-- 空状态提示 -->
        <div id="emptyState" class="empty-state hidden">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          <h3 class="empty-title">暂无匹配的模板</h3>
          <p class="empty-message">请尝试选择其他月份或节日，或者清除筛选条件查看所有模板。</p>
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="loading hidden">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部信息 -->
  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">朋友圈海报制作中心</div>
        <div class="footer-links">
          <a href="#" class="footer-link">关于我们</a>
          <a href="#" class="footer-link">使用教程</a>
          <a href="#" class="footer-link">隐私政策</a>
          <a href="#" class="footer-link">联系我们</a>
        </div>
        <div class="footer-copyright">© 2024 PostDIY. 保留所有权利。</div>
      </div>
    </div>
  </footer>
  
  <!-- 首页脚本 - 移到body末尾以确保DOM加载完成 -->
  <script src="script.js"></script>

  <!-- 调试脚本 -->
  <script>
    // 模板加载调试
    document.addEventListener('DOMContentLoaded', function() {
      console.log('首页模板加载完成');
      console.log('可用模板总数:', window.templates ? Object.values(window.templates).reduce((sum, monthTemplates) => sum + monthTemplates.length, 0) : 0);
      
      // 筛选调试器
      window.filtersDebugger = {
        getCurrentFilters: function() {
          return window.currentFilters;
        },
        getFilteredTemplates: function() {
          const templatesGrid = document.getElementById('templatesGrid');
          return templatesGrid.children.length;
        },
        resetFilters: function() {
          window.applyFilters(null, null);
        }
      };
      
      console.log('筛选调试器已加载:', window.filtersDebugger);
    });
  </script>
  
  <!-- VIP登录弹窗 -->
  <div id="vipLoginModal" class="modal-overlay hidden">
    <div class="modal vip-login-modal">
      <div class="modal-header fixed-header">
        <h2 class="modal-title">VIP登录</h2>
        <button id="closeVipLoginModalBtn" class="modal-close">&times;</button>
      </div>
      <div class="modal-body scrollable-body">
        <div class="vip-login-form">
          <div class="form-group inline-form-group">
            <label for="vipIdInput" class="form-label">用户</label>
            <input type="text" id="vipIdInput" class="form-input" placeholder="请输入用户名">
          </div>
          <div class="form-group inline-form-group">
            <label for="vipPasswordInput" class="form-label">密码</label>
            <input type="password" id="vipPasswordInput" class="form-input" placeholder="请输入密码">
          </div>
          <div id="vipLoginMessage" class="login-message"></div>
          <div class="login-actions">
            <button id="vipLoginSubmitBtn" class="action-btn primary">登录</button>
            <button id="vipLoginCancelBtn" class="action-btn secondary">取消</button>
          </div>
        
        </div>
      </div>
    </div>
  </div>

  <!-- 用户登录弹窗 -->
  <div id="userLoginModal" class="modal-overlay hidden">
    <div class="modal user-login-modal">
      <div class="modal-header fixed-header">
        <h2 class="modal-title">用户登录</h2>
        <button id="closeUserLoginModalBtn" class="modal-close">&times;</button>
      </div>
      <div class="modal-body scrollable-body">
        <!-- 登录/注册切换 -->
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">登录</button>
          <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label for="loginEmail" class="form-label">邮箱</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="请输入邮箱" required>
          </div>
          <div class="form-group">
            <label for="loginPassword" class="form-label">密码</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" required>
          </div>
          <div id="loginMessage" class="auth-message"></div>
          <div class="auth-actions">
            <button type="submit" class="action-btn primary">登录</button>
            <button type="button" id="cancelLoginBtn" class="action-btn secondary">取消</button>
          </div>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="registerEmail" class="form-label">邮箱</label>
            <input type="email" id="registerEmail" class="form-input" placeholder="请输入邮箱" required>
          </div>
          <div class="form-group">
            <label for="registerPassword" class="form-label">密码</label>
            <input type="password" id="registerPassword" class="form-input" placeholder="请输入密码（至少6位）" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword" class="form-label">确认密码</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
          </div>
          <div id="registerMessage" class="auth-message"></div>
          <div class="auth-actions">
            <button type="submit" class="action-btn primary">注册</button>
            <button type="button" id="cancelRegisterBtn" class="action-btn secondary">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 引入认证模块 -->
  <script src="src/auth.js"></script>
  <script src="src/user.js"></script>

  <!-- 用户认证脚本 -->
  <script>
    // 用户登录弹窗控制
    document.addEventListener('DOMContentLoaded', function() {
      const userLoginModal = document.getElementById('userLoginModal')
      const loginBtn = document.getElementById('loginBtn')
      const closeUserLoginModalBtn = document.getElementById('closeUserLoginModalBtn')
      const cancelLoginBtn = document.getElementById('cancelLoginBtn')
      const cancelRegisterBtn = document.getElementById('cancelRegisterBtn')
      const logoutBtn = document.getElementById('logoutBtn')

      // 打开登录弹窗
      loginBtn?.addEventListener('click', function() {
        userLoginModal.classList.remove('hidden')
      })

      // 关闭登录弹窗
      function closeUserLoginModal() {
        userLoginModal.classList.add('hidden')
      }

      closeUserLoginModalBtn?.addEventListener('click', closeUserLoginModal)
      cancelLoginBtn?.addEventListener('click', closeUserLoginModal)
      cancelRegisterBtn?.addEventListener('click', closeUserLoginModal)

      // 点击弹窗外部关闭
      userLoginModal?.addEventListener('click', function(e) {
        if (e.target === userLoginModal) {
          closeUserLoginModal()
        }
      })

      // 登录/注册标签切换
      const tabBtns = document.querySelectorAll('.tab-btn')
      const authForms = document.querySelectorAll('.auth-form')

      tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const tab = this.dataset.tab
          
          // 更新标签状态
          tabBtns.forEach(b => b.classList.remove('active'))
          this.classList.add('active')
          
          // 更新表单显示
          authForms.forEach(form => form.classList.remove('active'))
          document.getElementById(tab + 'Form').classList.add('active')
        })
      })

      // 登录表单提交
      document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
        e.preventDefault()
        
        const email = document.getElementById('loginEmail').value
        const password = document.getElementById('loginPassword').value
        const messageEl = document.getElementById('loginMessage')
        
        try {
          messageEl.textContent = '登录中...'
          messageEl.className = 'auth-message info'
          
          await window.authManager.login(email, password)
          messageEl.textContent = '登录成功！'
          messageEl.className = 'auth-message success'
          
          setTimeout(() => {
            closeUserLoginModal()
            messageEl.textContent = ''
          }, 1000)
        } catch (error) {
          messageEl.textContent = error.message
          messageEl.className = 'auth-message error'
        }
      })

      // 注册表单提交
      document.getElementById('registerForm')?.addEventListener('submit', async function(e) {
        e.preventDefault()
        
        const email = document.getElementById('registerEmail').value
        const password = document.getElementById('registerPassword').value
        const confirmPassword = document.getElementById('confirmPassword').value
        const messageEl = document.getElementById('registerMessage')
        
        if (password !== confirmPassword) {
          messageEl.textContent = '两次输入的密码不一致'
          messageEl.className = 'auth-message error'
          return
        }
        
        try {
          messageEl.textContent = '注册中...'
          messageEl.className = 'auth-message info'
          
          await window.authManager.register(email, password)
          messageEl.textContent = '注册成功！请登录'
          messageEl.className = 'auth-message success'
          
          // 切换到登录标签
          document.querySelector('[data-tab="login"]').click()
          document.getElementById('loginEmail').value = email
          
          setTimeout(() => {
            messageEl.textContent = ''
          }, 3000)
        } catch (error) {
          messageEl.textContent = error.message
          messageEl.className = 'auth-message error'
        }
      })

      // 用户登出
      logoutBtn?.addEventListener('click', function() {
        window.authManager.logout()
      })
    })
  </script>
</body>
</html>
