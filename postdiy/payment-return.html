<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付结果处理中</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fff7f6 0%, #ffffff 100%);
      color: #333333;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .panel {
      width: min(92vw, 420px);
      padding: 28px 24px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(180, 20, 8, 0.08);
      text-align: center;
    }

    .title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
      color: #b41408;
    }

    .desc {
      margin: 0;
      line-height: 1.7;
      font-size: 14px;
      color: #666666;
    }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #999999;
    }

    .button {
      margin-top: 20px;
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #b41408, #da4b40);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1 class="title">支付结果处理中</h1>
    <p class="desc">请稍候，正在把支付结果同步给 App。若页面没有自动关闭，可点击下方按钮返回首页。</p>
    <p id="statusText" class="status">正在等待 App 接收支付结果...</p>
    <button id="backButton" class="button" type="button">返回首页</button>
  </div>

  <script>
    (function () {
      const statusText = document.getElementById('statusText')
      const params = new URLSearchParams(window.location.search)

      function setStatus(text) {
        if (statusText) {
          statusText.textContent = text
        }
      }

      function buildPayload() {
        return {
          action: 'paymentReturn',
          tradeStatus: params.get('trade_status') || '',
          outTradeNo: params.get('out_trade_no') || '',
          tradeNo: params.get('trade_no') || '',
          money: params.get('money') || '',
          type: params.get('type') || '',
          sign: params.get('sign') || '',
          signType: params.get('sign_type') || ''
        }
      }

      function postToApp(payload) {
        try {
          if (window.uni && window.uni.webView && typeof window.uni.webView.postMessage === 'function') {
            window.uni.webView.postMessage({ data: payload })
            return true
          }

          if (window.__uniapp_x_postMessage) {
            window.__uniapp_x_postMessage({ data: payload })
            return true
          }

          if (window.__uniapp_x_ && typeof window.__uniapp_x_.postMessage === 'function') {
            window.__uniapp_x_.postMessage(JSON.stringify({ data: payload }))
            return true
          }
        } catch (error) {
          console.error('[payment-return] 回传支付结果失败:', error)
        }

        return false
      }

      function redirectToHome() {
        const pathname = window.location.pathname || '/'
        const basePath = pathname.slice(0, pathname.lastIndexOf('/') + 1)
        const targetUrl = `${window.location.origin}${basePath}index.html${window.location.search}`
        window.location.replace(targetUrl)
      }

      document.getElementById('backButton').addEventListener('click', redirectToHome)

      const payload = buildPayload()
      const posted = postToApp(payload)

      if (posted) {
        setStatus('已通知 App 处理支付结果，请稍候自动返回...')
        return
      }

      setStatus('当前不在 App 内，正在返回网页首页...')
      setTimeout(redirectToHome, 1200)
    })()
  </script>
</body>
</html>
