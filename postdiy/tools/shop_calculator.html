<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开店必备：60个计算公式计算器</title>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入公共标题头 -->
    <script>
        // 动态加载公共标题头
        fetch('common-header.html')
            .then(response => response.text())
            .then(html => {
                // 创建临时 div 来解析 HTML
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                
                // 提取样式和内容
                const style = tempDiv.querySelector('style').outerHTML;
                const header = tempDiv.querySelector('header').outerHTML;
                const script = tempDiv.querySelector('script').textContent;
                
                // 插入到页面中
                document.head.insertAdjacentHTML('beforeend', style);
                document.body.insertAdjacentHTML('afterbegin', header);
                
                // 直接执行初始化函数
                eval(script);
                initCommonHeader(); // 手动调用初始化函数
            })
            .catch(error => console.error('加载公共标题头失败:', error));
    </script>
    <!-- 引入独立 CSS 文件 -->
    <link rel="stylesheet" href="shop_calculator.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 开店常用60个计算公式计算器</h1>
            <small>王辉 | 股权+组织系统 笔记整理</small>
        </header>

        <div class="tabs" id="tabs">
            <!-- Tabs will be generated by JS -->
        </div>

        <div id="calculator-container">
            <!-- Formulas will be loaded here -->
        </div>
    </div>

    <script>
        // 公式数据库
        const formulas = [
            // 一、基础财务指标
            {
                id: 1,
                category: "基础财务指标",
                name: "毛利",
                formula: "营业额 - 成本",
                calculate: (inputs) => {
                    if (inputs.营业额 && inputs.成本) return inputs.营业额 - inputs.成本;
                    return null;
                },
                inputs: [
                    { name: "营业额", key: "营业额", unit: "元" },
                    { name: "成本", key: "成本", unit: "元" }
                ]
            },
            {
                id: 2,
                category: "基础财务指标",
                name: "毛利率",
                formula: "(毛利 ÷ 营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.毛利 && inputs.营业额) return (inputs.毛利 / inputs.营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "毛利", key: "毛利", unit: "元" },
                    { name: "营业额", key: "营业额", unit: "元" }
                ]
            },
            {
                id: 3,
                category: "基础财务指标",
                name: "利润",
                formula: "毛利 - 费用",
                calculate: (inputs) => {
                    if (inputs.毛利 && inputs.费用) return inputs.毛利 - inputs.费用;
                    return null;
                },
                inputs: [
                    { name: "毛利", key: "毛利", unit: "元" },
                    { name: "费用", key: "费用", unit: "元" }
                ]
            },
            {
                id: 4,
                category: "基础财务指标",
                name: "利润率",
                formula: "(利润 ÷ 营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.利润 && inputs.营业额) return (inputs.利润 / inputs.营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "利润", key: "利润", unit: "元" },
                    { name: "营业额", key: "营业额", unit: "元" }
                ]
            },
            {
                id: 5,
                category: "基础财务指标",
                name: "成本率",
                formula: "(成本 ÷ 营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.成本 && inputs.营业额) return (inputs.成本 / inputs.营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "成本", key: "成本", unit: "元" },
                    { name: "营业额", key: "营业额", unit: "元" }
                ]
            },
            {
                id: 6,
                category: "基础财务指标",
                name: "费用率",
                formula: "(费用 ÷ 营业额) × 100%",

                },

                    { name: "费用", key: "费用", unit: "元" },
                    { name: "营业额", key: "营业额", unit: "元" }

            {

                },

                    { name: "毛利率", key: "毛利率", unit: "%" }

            {

                    { name: "年折旧额", key: "年折旧额", unit: "元" },

            {
                id: 15,
                category: "运营效率分析",
                name: "坪效",
                formula: "营业额 ÷ 店铺面积",
                calculate: (inputs) => {
                    if (inputs.营业额 && inputs.店铺面积) return inputs.营业额 / inputs.店铺面积;

                },
                inputs: [
                    { name: "营业额", key: "营业额", unit: "元" },
                    { name: "店铺面积", key: "店铺面积", unit: "平米" }
                ]
            },
            {
                id: 16,
                category: "运营效率分析",
                name: "人效",
                formula: "营业额 ÷ 员工人数",
                calculate: (inputs) => {
                    if (inputs.营业额 && inputs.员工人数) return inputs.营业额 / inputs.员工人数;
                    return null;
                },
                inputs: [
                    { name: "营业额", key: "营业额", unit: "元" },
                    { name: "员工人数", key: "员工人数", unit: "人" }
                ]
            },
            {
                id: 17,
                category: "运营效率分析",
                name: "连带率",
                formula: "销售总件数 ÷ 客单数",
                calculate: (inputs) => {
                    if (inputs.销售总件数 && inputs.客单数) return inputs.销售总件数 / inputs.客单数;

                },
                inputs: [
                    { name: "销售总件数", key: "销售总件数", unit: "件" },
                    { name: "客单数", key: "客单数", unit: "单" }
                ]
            },
            {
                id: 18,
                category: "运营效率分析",
                name: "客单价 (ASP)",
                formula: "营业额 ÷ 销售件数",
                calculate: (inputs) => {
                    if (inputs.营业额 && inputs.销售件数) return inputs.营业额 / inputs.销售件数;
                    return null;
                },
                inputs: [
                    { name: "营业额", key: "营业额", unit: "元" },

                ]
            },
            {
                id: 19,
                category: "运营效率分析",
                name: "ATV (平均交易额)",

                    if (inputs.营业额 && inputs.客单数) return inputs.营业额 / inputs.客单数;

                inputs: [
                    { name: "营业额", key: "营业额", unit: "元" },

            {
                id: 20,
                category: "运营效率分析",
                name: "转化率",
                formula: "(成交顾客数 ÷ 进店顾客数) × 100%",
                calculate: (inputs) => {
                    if (inputs.成交顾客数 && inputs.进店顾客数) return (inputs.成交顾客数 / inputs.进店顾客数) * 100;
                    return null;
                },
                inputs: [
                    { name: "成交顾客数", key: "成交顾客数", unit: "人" },
                    { name: "进店顾客数", key: "进店顾客数", unit: "人" }
                ]
            },
            {
                id: 21,
                category: "运营效率分析",
                name: "复购率",
                formula: "(重复消费顾客数 ÷ 总顾客数) × 100%",
                calculate: (inputs) => {
                    if (inputs.重复消费顾客数 && inputs.总顾客数) return (inputs.重复消费顾客数 / inputs.总顾客数) * 100;
                    return null;
                },
                inputs: [
                    { name: "重复消费顾客数", key: "重复消费顾客数", unit: "人" },
                    { name: "总顾客数", key: "总顾客数", unit: "人" }
                ]
            },
            {
                id: 22,
                category: "运营效率分析",
                name: "VIP客户占比",
                formula: "(VIP消费额 ÷ 总营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.VIP消费额 && inputs.总营业额) return (inputs.VIP消费额 / inputs.总营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "VIP消费额", key: "VIP消费额", unit: "元" },
                    { name: "总营业额", key: "总营业额", unit: "元" }
                ]
            },
            {
                id: 23,
                category: "运营效率分析",
                name: "达标率",
                formula: "(实际营业额 ÷ 目标营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.实际营业额 && inputs.目标营业额) return (inputs.实际营业额 / inputs.目标营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "实际营业额", key: "实际营业额", unit: "元" },
                    { name: "目标营业额", key: "目标营业额", unit: "元" }
                ]
            },
            {
                id: 24,
                category: "运营效率分析",
                name: "同期业绩增长率",
                formula: "((本期营业额 - 上期营业额) ÷ 上期营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.本期营业额 && inputs.上期营业额) return ((inputs.本期营业额 - inputs.上期营业额) / inputs.上期营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "本期营业额", key: "本期营业额", unit: "元" },
                    { name: "上期营业额", key: "上期营业额", unit: "元" }

            {

                },
                inputs: [
                    { name: "实际在岗人数", key: "实际在岗人数", unit: "人" },

                id: 26,

                calculate: (inputs) => {
                    if (inputs.岗位业绩 && inputs.总营业额) return (inputs.岗位业绩 / inputs.总营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "岗位业绩", key: "岗位业绩", unit: "元" },
                    { name: "总营业额", key: "总营业额", unit: "元" }
                ]
            },
            {
                id: 27,
                category: "运营效率分析",
                name: "人均岗位贡献率",
                formula: "岗位贡献率 ÷ 在岗人数",
                calculate: (inputs) => {
                    if (inputs.岗位贡献率 && inputs.在岗人数) return inputs.岗位贡献率 / inputs.在岗人数;
                    return null;
                },
                inputs: [
                    { name: "岗位贡献率", key: "岗位贡献率", unit: "%" },
                    { name: "在岗人数", key: "在岗人数", unit: "人" }
                ]
            },
            {
                id: 28,
                category: "运营效率分析",
                name: "成单时间",
                formula: "总服务时间 ÷ 成交单数",
                calculate: (inputs) => {
                    if (inputs.总服务时间 && inputs.成交单数) return inputs.总服务时间 / inputs.成交单数;
                    return null;
                },
                inputs: [
                    { name: "总服务时间", key: "总服务时间", unit: "小时" },
                    { name: "成交单数", key: "成交单数", unit: "单" }
                ]
            },
            {
                id: 29,
                category: "运营效率分析",
                name: "员工流失率",
                formula: "(离职人数 ÷ 平均在职人数) × 100%",
                calculate: (inputs) => {
                    if (inputs.离职人数 && inputs.平均在职人数) return (inputs.离职人数 / inputs.平均在职人数) * 100;
                    return null;
                },
                inputs: [
                    { name: "离职人数", key: "离职人数", unit: "人" },
                    { name: "平均在职人数", key: "平均在职人数", unit: "人" }
                ]
            },
            {
                id: 30,
                category: "运营效率分析",
                name: "员工工资占比",
                formula: "(工资总额 ÷ 营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.工资总额 && inputs.营业额) return (inputs.工资总额 / inputs.营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "工资总额", key: "工资总额", unit: "元" },
                    { name: "营业额", key: "营业额", unit: "元" }
                ]
            },
            {
                id: 31,
                category: "运营效率分析",
                name: "房租占比",
                formula: "(月租金 ÷ 月营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.月租金 && inputs.月营业额) return (inputs.月租金 / inputs.月营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "月租金", key: "月租金", unit: "元" },
                    { name: "月营业额", key: "月营业额", unit: "元" }
                ]
            },
            {
                id: 32,
                category: "运营效率分析",
                name: "营销费用占比",
                formula: "(营销费用 ÷ 营业额) × 100%",
                calculate: (inputs) => {
                    if (inputs.营销费用 && inputs.营业额) return (inputs.营销费用 / inputs.营业额) * 100;
                    return null;
                },
                inputs: [
                    { name: "营销费用", key: "营销费用", unit: "元" },
                    { name: "营业额", key: "营业额", unit: "元" }
                ]
            },

            // 三、增长与营销策略
            {
                id: 33,
                category: "增长与营销策略",
                name: "销售额增长公式",
                formula: "流量 × 转化率 × 客单价 × 复购率",
                calculate: (inputs) => {
                    if (inputs.流量 && inputs.转化率 && inputs.客单价 && inputs.复购率) {
                        // 注意：转化率和复购率如果是百分比，需要除以100
                        const rate1 = inputs.转化率 / 100;
                        const rate2 = inputs.复购率 / 100;
                        return inputs.流量 * rate1 * inputs.客单价 * rate2;
                    }
                    return null;
                },
                inputs: [
                    { name: "流量", key: "流量", unit: "人" },
                    { name: "转化率", key: "转化率", unit: "%" },
                    { name: "客单价", key: "客单价", unit: "元" },
                    { name: "复购率", key: "复购率", unit: "%" }
                ]
            },
            {
                id: 34,
                category: "增长与营销策略",
                name: "裂变率",
                formula: "(新客户数 ÷ 老客户数) × 100%",
                calculate: (inputs) => {
                    if (inputs.新客户数 && inputs.老客户数) return (inputs.新客户数 / inputs.老客户数) * 100;
                    return null;
                },
                inputs: [
                    { name: "新客户数", key: "新客户数", unit: "人" },
                    { name: "老客户数", key: "老客户数", unit: "人" }
                ]
            },
            {
                id: 35,
                category: "增长与营销策略",
                name: "获客成本 (CAC)",
                formula: "营销费用 ÷ 新增客户数",
                calculate: (inputs) => {
                    if (inputs.营销费用 && inputs.新增客户数) return inputs.营销费用 / inputs.新增客户数;
                    return null;
                },
                inputs: [
                    { name: "营销费用", key: "营销费用", unit: "元" },
                    { name: "新增客户数", key: "新增客户数", unit: "人" }
                ]
            },
            {
                id: 36,
                category: "增长与营销策略",
                name: "客户生命周期价值 (CLV)",
                formula: "客单价 × 年均购买次数 × 客户留存年数",
                calculate: (inputs) => {
                    if (inputs.客单价 && inputs.年均购买次数 && inputs.客户留存年数) {
                        return inputs.客单价 * inputs.年均购买次数 * inputs.客户留存年数;
                    }
                    return null;
                },
                inputs: [
                    { name: "客单价", key: "客单价", unit: "元" },
                    { name: "年均购买次数", key: "年均购买次数", unit: "次" },
                    { name: "客户留存年数", key: "客户留存年数", unit: "年" }
                ]
            },
            {
                id: 37,
                category: "增长与营销策略",
                name: "促销活动ROI",
                formula: "((促销收益 - 促销成本) ÷ 促销成本) × 100%",
                calculate: (inputs) => {
                    if (inputs.促销收益 && inputs.促销成本) return ((inputs.促销收益 - inputs.促销成本) / inputs.促销成本) * 100;
                    return null;
                },
                inputs: [
                    { name: "促销收益", key: "促销收益", unit: "元" },
                    { name: "促销成本", key: "促销成本", unit: "元" }
                ]
            },
            {
                id: 38,
                category: "增长与营销策略",
                name: "市场占有率",
                formula: "(本店销售额 ÷ 行业总销售额) × 100%",
                calculate: (inputs) => {
                    if (inputs.本店销售额 && inputs.行业总销售额) return (inputs.本店销售额 / inputs.行业总销售额) * 100;
                    return null;
                },
                inputs: [
                    { name: "本店销售额", key: "本店销售额", unit: "元" },
                    { name: "行业总销售额", key: "行业总销售额", unit: "元" }
                ]
            },
            {
                id: 39,
                category: "增长与营销策略",
                name: "促销活动覆盖率",
                formula: "(参与活动客户数 ÷ 总客户数) × 100%",
                calculate: (inputs) => {
                    if (inputs.参与活动客户数 && inputs.总客户数) return (inputs.参与活动客户数 / inputs.总客户数) * 100;
                    return null;
                },
                inputs: [
                    { name: "参与活动客户数", key: "参与活动客户数", unit: "人" },
                    { name: "总客户数", key: "总客户数", unit: "人" }
                ]
            },

            // 四、库存与供应链管理
            {
                id: 40,
                category: "库存与供应链管理",
                name: "缺货率",
                formula: "(缺货商品数 ÷ 总商品数) × 100%",
                calculate: (inputs) => {
                    if (inputs.缺货商品数 && inputs.总商品数) return (inputs.缺货商品数 / inputs.总商品数) * 100;
                    return null;
                },
                inputs: [
                    { name: "缺货商品数", key: "缺货商品数", unit: "件" },
                    { name: "总商品数", key: "总商品数", unit: "件" }
                ]
            },
            {
                id: 41,
                category: "库存与供应链管理",
                name: "净料率",
                formula: "((净料重量 ÷ 毛料重量) × 100%)",
                calculate: (inputs) => {
                    if (inputs.净料重量 && inputs.毛料重量) return (inputs.净料重量 / inputs.毛料重量) * 100;
                    return null;
                },
                inputs: [
                    { name: "净料重量", key: "净料重量", unit: "斤/公斤" },
                    { name: "毛料重量", key: "毛料重量", unit: "斤/公斤" }
                ]
            },
            {
                id: 42,
                category: "库存与供应链管理",
                name: "丢失率",
                formula: "(丢失金额 ÷ 销售额) × 100%",
                calculate: (inputs) => {
                    if (inputs.丢失金额 && inputs.销售额) return (inputs.丢失金额 / inputs.销售额) * 100;
                    return null;
                },
                inputs: [
                    { name: "丢失金额", key: "丢失金额", unit: "元" },
                    { name: "销售额", key: "销售额", unit: "元" }
                ]
            },
            {
                id: 43,
                category: "库存与供应链管理",
                name: "动销率",
                formula: "(有销售的商品数 ÷ 总库存商品数) × 100%",
                calculate: (inputs) => {
                    if (inputs.有销售的商品数 && inputs.总库存商品数) return (inputs.有销售的商品数 / inputs.总库存商品数) * 100;
                    return null;
                },
                inputs: [
                    { name: "有销售的商品数", key: "有销售的商品数", unit: "件" },
                    { name: "总库存商品数", key: "总库存商品数", unit: "件" }
                ]
            },

            // 五、客户与市场分析
            {
                id: 44,
                category: "客户与市场分析",
                name: "客户满意度指数",
                formula: "(满意客户数 ÷ 调研总客户数) × 100%",
                calculate: (inputs) => {
                    if (inputs.满意客户数 && inputs.调研总客户数) return (inputs.满意客户数 / inputs.调研总客户数) * 100;
                    return null;
                },
                inputs: [
                    { name: "满意客户数", key: "满意客户数", unit: "人" },
                    { name: "调研总客户数", key: "调研总客户数", unit: "人" }
                ]
            },
            {
                id: 45,
                category: "客户与市场分析",
                name: "新客占比",
                formula: "(新客户数 ÷ 总客户数) × 100%",
                calculate: (inputs) => {
                    if (inputs.新客户数 && inputs.总客户数) return (inputs.新客户数 / inputs.总客户数) * 100;
                    return null;
                },
                inputs: [
                    { name: "新客户数", key: "新客户数", unit: "人" },
                    { name: "总客户数", key: "总客户数", unit: "人" }
                ]
            },
            {
                id: 46,
                category: "客户与市场分析",
                name: "会员活跃度",
                formula: "(活跃会员数 ÷ 总会员数) × 100%",
                calculate: (inputs) => {
                    if (inputs.活跃会员数 && inputs.总会员数) return (inputs.活跃会员数 / inputs.总会员数) * 100;
                    return null;
                },
                inputs: [
                    { name: "活跃会员数", key: "活跃会员数", unit: "人" },
                    { name: "总会员数", key: "总会员数", unit: "人" }
                ]
            },
            {
                id: 47,
                category: "客户与市场分析",
                name: "客诉处理率",
                formula: "(已解决客诉数 ÷ 总客诉数) × 100%",
                calculate: (inputs) => {
                    if (inputs.已解决客诉数 && inputs.总客诉数) return (inputs.已解决客诉数 / inputs.总客诉数) * 100;
                    return null;
                },
                inputs: [
                    { name: "已解决客诉数", key: "已解决客诉数", unit: "件" },
                    { name: "总客诉数", key: "总客诉数", unit: "件" }
                ]
            },
            {
                id: 48,
                category: "客户与市场分析",
                name: "翻台率 (餐饮)",
                formula: "日均用餐次数 ÷ 桌数",
                calculate: (inputs) => {
                    if (inputs.日均用餐次数 && inputs.桌数) return inputs.日均用餐次数 / inputs.桌数;
                    return null;
                },
                inputs: [
                    { name: "日均用餐次数", key: "日均用餐次数", unit: "次" },
                    { name: "桌数", key: "桌数", unit: "桌" }
                ]
            },

            // 六、综合经营指标
            {
                id: 49,
                category: "综合经营指标",
                name: "托宾Q比率",
                formula: "市场价值 ÷ 资产重置成本",
                calculate: (inputs) => {
                    if (inputs.市场价值 && inputs.资产重置成本) return inputs.市场价值 / inputs.资产重置成本;
                    return null;
                },
                inputs: [
                   { name: "市场价值", key: "市场价值", unit: "元" },
                    { name: "资产重置成本", key: "资产重置成本", unit: "元" }
                ]
            },
            {
                id: 50,
                category: "综合经营指标",
                name: "投资回报率 (ROI)",
                formula: "((净收益 - 投资成本) ÷ 投资成本) × 100%",
                calculate: (inputs) => {
                    if (inputs.净收益 && inputs.投资成本) return ((inputs.净收益 - inputs.投资成本) / inputs.投资成本) * 100;
                    return null;
                },
                inputs: [
                    { name: "净收益", key: "净收益", unit: "元" },
                    { name: "投资成本", key: "投资成本", unit: "元" }
                ]
            },
            {
                id: 51,
                category: "综合经营指标",
                name: "盈亏平衡点销量",
                formula: "固定成本 ÷ (单价 - 单位变动成本)",
                calculate: (inputs) => {
                    if (inputs.固定成本 && inputs.单价 && inputs.单位变动成本) return inputs.固定成本 / (inputs.单价 - inputs.单位变动成本);
                    return null;
                },
                inputs: [
                    { name: "固定成本", key: "固定成本", unit: "元" },
                    { name: "单价", key: "单价", unit: "元" },
                    { name: "单位变动成本", key: "单位变动成本", unit: "元" }
                ]
            },
            {
                id: 52,
                category: "综合经营指标",
                name: "安全边际率",
                formula: "((实际销售额 - 盈亏销售额) ÷ 实际销售额) × 100%",
                calculate: (inputs) => {
                    if (inputs.实际销售额 && inputs.盈亏销售额) return ((inputs.实际销售额 - inputs.盈亏销售额) / inputs.实际销售额) * 100;
                    return null;
                },
                inputs: [
                    { name: "实际销售额", key: "实际销售额", unit: "元" },
                    { name: "盈亏销售额", key: "盈亏销售额", unit: "元" }
                ]
            },
            {
                id: 53,
                category: "综合经营指标",
                name: "经营杠杆系数 (DOL)",
                formula: "息税前利润变动率 ÷ 产销业务量变动率",
                calculate: (inputs) => {
                    if (inputs.息税前利润变动率 && inputs.产销业务量变动率) return inputs.息税前利润变动率 / inputs.产销业务量变动率;
                    return null;
                },
                inputs: [
                    { name: "息税前利润变动率", key: "息税前利润变动率", unit: "%" },
                    { name: "产销业务量变动率", key: "产销业务量变动率", unit: "%" }
                ]
            },
            {
                id: 54,
                category: "综合经营指标",
                name: "财务杠杆系数 (DFL)",
                formula: "普通股每股收益变动率 ÷ 息税前利润变动率",
                calculate: (inputs) => {
                    if (inputs.普通股每股收益变动率 && inputs.息税前利润变动率) return inputs.普通股每股收益变动率 / inputs.息税前利润变动率;
                    return null;
                },
                inputs: [
                    { name: "普通股每股收益变动率", key: "普通股每股收益变动率", unit: "%" },
                    { name: "息税前利润变动率", key: "息税前利润变动率", unit: "%" }
                ]
            },
            {
                id: 55,
                category: "综合经营指标",
                name: "总杠杆系数 (DTL)",
                formula: "经营杠杆系数 × 财务杠杆系数",
                calculate: (inputs) => {
                    if (inputs.经营杠杆系数 && inputs.财务杠杆系数) return inputs.经营杠杆系数 * inputs.财务杠杆系数;
                    return null;
                },
                inputs: [
                    { name: "经营杠杆系数 (DOL)", key: "经营杠杆系数", unit: "" },
                    { name: "财务杠杆系数 (DFL)", key: "财务杠杆系数", unit: "" }
                ]
            },
            {
                id: 56,
                category: "综合经营指标",
                name: "经济增加值 (EVA)",
                formula: "税后净营业利润 - 资本成本",
                calculate: (inputs) => {
                    if (inputs.税后净营业利润 && inputs.资本成本) return inputs.税后净营业利润 - inputs.资本成本;
                    return null;
                },
                inputs: [
                    { name: "税后净营业利润", key: "税后净营业利润", unit: "元" },
                    { name: "资本成本", key: "资本成本", unit: "元" }
                ]
            },
            {
                id: 57,
                category: "综合经营指标",
                name: "门店盈亏平衡天数",
                formula: "固定成本 ÷ 日均利润",
                calculate: (inputs) => {
                    if (inputs.固定成本 && inputs.日均利润) return inputs.固定成本 / inputs.日均利润;
                    return null;
                },
                inputs: [
                    { name: "固定成本", key: "固定成本", unit: "元" },
                    { name: "日均利润", key: "日均利润", unit: "元" }
                ]
            },
            {
                id: 58,
                category: "综合经营指标",
                name: "回本周期",
                formula: "总投资额 ÷ 月均净利润",
                calculate: (inputs) => {
                    if (inputs.总投资额 && inputs.月均净利润) return inputs.总投资额 / inputs.月均净利润;
                    return null;
                },
                inputs: [
                    { name: "总投资额", key: "总投资额", unit: "元" },
                    { name: "月均净利润", key: "月均净利润", unit: "元" }
                ]
            },
            {
                id: 59,
                category: "综合经营指标",
                name: "资金周转率",
                formula: "营业收入 ÷ 平均流动资产",
                calculate: (inputs) => {
                    if (inputs.营业收入 && inputs.平均流动资产) return inputs.营业收入 / inputs.平均流动资产;
                    return null;
                },
                inputs: [
                    { name: "营业收入", key: "营业收入", unit: "元" },
                    { name: "平均流动资产", key: "平均流动资产", unit: "元" }
                ]
            },
            {
                id: 60,
                category: "综合经营指标",
                name: "净资产收益率 (ROE)",
                formula: "(净利润 ÷ 股东权益) × 100%",
                calculate: (inputs) => {
                    if (inputs.净利润 && inputs.股东权益) return (inputs.净利润 / inputs.股东权益) * 100;
                    return null;
                },
                inputs: [
                    { name: "净利润", key: "净利润", unit: "元" },
                    { name: "股东权益", key: "股东权益", unit: "元" }
                ]
            }
        ];

        // 获取所有分类
        const categories = [...new Set(formulas.map(f => f.category))];

        // 渲染Tabs
        const tabsContainer = document.getElementById('tabs');
        categories.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
            btn.textContent = cat;
            btn.onclick = () => switchTab(cat);
            tabsContainer.appendChild(btn);
        });

        // 渲染计算器卡片
        const container = document.getElementById('calculator-container');
        formulas.forEach((formula, index) => {
            const card = document.createElement('div');
            card.className = 'calculator-card' + (index < 10 ? ' active' : ''); // 默认显示第一个分类的前几个
            card.dataset.category = formula.category;
            card.id = `calc-${formula.id}`;

            let inputsHTML = formula.inputs.map(input => `
                <div class="input-group">
                    <label>${input.name} (${input.unit})</label>
                    <input type="number" id="${formula.id}-${input.key}" placeholder="请输入${input.name}">
                </div>
            `).join('');

            card.innerHTML = `
                <div class="formula-title">${formula.id}. ${formula.name}</div>
                <div class="formula-display">${formula.formula}</div>
                ${inputsHTML}
                <button class="tab-btn" style="width:100%; background-color: var(--secondary-color); color:white; border:none; padding:12px;" onclick="calculate(${formula.id})">计算</button>
                <div class="result-box" id="result-${formula.id}"></div>
                <div class="note">注：请确保所有输入框都已填写有效数字。</div>
            `;
            container.appendChild(card);
        });

        function switchTab(category) {
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            
            // 更新卡片显示
            document.querySelectorAll('.calculator-card').forEach(card => {
                if (card.dataset.category === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function calculate(id) {
            const formula = formulas.find(f => f.id === id);
            const inputs = {};
            
            formula.inputs.forEach(input => {
                const el = document.getElementById(`${id}-${input.key}`);
                inputs[input.key] = parseFloat(el.value) || 0;
            });

            const result = formula.calculate(inputs);
            const resultBox = document.getElementById(`result-${id}`);

            if (result !== null && isFinite(result)) {
                resultBox.style.display = 'block';
                resultBox.innerHTML = `计算结果：<strong>${result.toFixed(2)}</strong>`;
            } else {
                resultBox.style.display = 'block';
                resultBox.innerHTML = '⚠️ 请输入有效的数值进行计算';
                resultBox.style.backgroundColor = '#fff3cd';
                resultBox.style.borderColor = '#ffc107';
                resultBox.style.color = '#856404';
            }
        }
    </script>
</body>
</html>
