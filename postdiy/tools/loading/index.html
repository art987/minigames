<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>加载动画示例</title>
    <style>
        :root {
            --accent-pink: #ff3b7f;
            --accent-magenta: #ff2aa6;
            --accent-purple: #7c4dff;
            --accent-aqua: #00ffa3;
            --bg: #0a0b12;
            --panel: #121522;
            --fg: #ecf1ff;
            --muted: #a9b4c7;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            background:
                radial-gradient(1200px 600px at 10% -10%, #1a2242 0, rgba(26, 34, 66, 0) 60%),
                radial-gradient(1200px 600px at 110% 110%, #261a4a 0, rgba(38, 26, 74, 0) 60%),
                var(--bg);
            color: var(--fg);
            font: clamp(15px, 2.3vw, 17px)/1.45 -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Inter, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .shell {
            width: min(800px, 80vw);
            background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35), inset 0 0 0 1px rgba(255, 255, 255, .06);
            padding: clamp(18px, 5vw, 28px) clamp(16px, 5vw, 32px);
            text-align: center
        }

        h1 {
            margin: 0 0 .2em;
            font-size: clamp(22px, 6vw, 36px);
            font-weight: 800;
            letter-spacing: .2px
        }

        .sub {
            color: var(--muted);
            font-size: clamp(13px, 3.6vw, 15px);
            margin-bottom: clamp(14px, 5vw, 20px)
        }

        .domain {
            color: #ffd9ec
        }

        .bar {
            position: relative;
            height: clamp(14px, 3.5vw, 18px);
            background: linear-gradient(180deg, #0f1630, #0c1226);
            border-radius: 999px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .06), 0 10px 26px rgba(0, 0, 0, .35)
        }

        .fill {
            position: absolute;
            inset: 0;
            width: 0%;
            border-radius: 999px;
            background:
                linear-gradient(90deg, #ff0000cc, rgb(209 207 209 / 0%)), linear-gradient(90deg, #7823c5cc, #3900d9 30%, #f1ff1bd1 70%, #2df74fcc);
            box-shadow: 0 8px 28px rgba(255, 59, 127, .28), 0 0 32px rgba(124, 77, 255, .35);
            overflow: hidden;
            transition: width 1s ease-out
        }

        .sheen {
            position: absolute;
            inset: -20px 0 -20px;
            background: repeating-linear-gradient(100deg, rgba(255, 255, 255, .16) 0 10px, transparent 10px 22px);
            mix-blend-mode: overlay;
            animation: sheen 1.6s linear infinite
        }

        @keyframes sheen {
            to {
                transform: translateX(100%)
            }
        }

        .pct {
            margin: .5em 0 0;
            font-size: clamp(12px, 3.5vw, 14px);
            color: #d7e0f5;
            letter-spacing: .3px
        }

        .dots {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px
        }

        .dot {
            width: clamp(8px, 3vw, 10px);
            height: clamp(8px, 3vw, 10px);
            border-radius: 50%;
            background: var(--accent-purple);
            opacity: .5;
            animation: pulse 1.15s ease-in-out infinite
        }

        .dot:nth-child(2) {
            animation-delay: .18s
        }

        .dot:nth-child(3) {
            animation-delay: .36s
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(.6);
                opacity: .35
            }

            50% {
                transform: scale(1);
                opacity: 1
            }
        }

        .tips {
            margin-top: 14px;
            color: var(--muted);
            font-size: clamp(12px, 3.2vw, 13px)
        }

        @media (prefers-reduced-motion: reduce) {
            .sheen {
                animation: none
            }

            .fill {
                transition: none
            }
        }
    </style>
</head>

<body>
    <main class="shell" aria-live="polite">
        <div class="sub"><span class="domain" id="js-domain">极速加载中...</span>，请稍候</div>
        <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="页面预热进度">
            <div class="fill" id="js-fill">
                <div class="sheen"></div>
            </div>
        </div>
        <div class="pct" id="js-pct">0%</div>
        <div class="dots" aria-hidden="true">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
      
    </main>
    <script>
        (function() {
            const $f = document.getElementById('js-fill');
            const $p = document.getElementById('js-pct');
            const $b = document.querySelector('.bar');

            function setProgress(x) {
                x = Math.max(0, Math.min(100, x | 0));
                $f.style.width = x + '%';
                $b.setAttribute('aria-valuenow', x);
                $p.textContent = x + '%';
            }

            let progress = 0;
            setProgress(0);

            const timer = setInterval(() => {
                if (progress < 75) {
                    progress += 3;
                } else if (progress < 95) {
                    progress += 1;
                }
                setProgress(progress);

                if (progress >= 100) {
                    clearInterval(timer);
                }
            }, 50);

            setTimeout(() => {
                clearInterval(timer);
                
                const finalTimer = setInterval(() => {
                    progress += 2;
                    setProgress(progress);
                    if (progress >= 100) {
                        clearInterval(finalTimer);
                        setProgress(100);
                    }
                }, 40);
            }, 2000);
        })();
    </script>
</body>

</html>
