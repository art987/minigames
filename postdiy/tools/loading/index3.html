<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹林萤火虫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a100d;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 200, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 150, 0.5);
            z-index: 10;
        }
        .subtitle {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180, 200, 180, 0.6);
            font-size: 14px;
            letter-spacing: 3px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="title">竹林萤火虫</div>
    <div class="subtitle">Bamboo Forest & Fireflies</div>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 萤火虫类
        class Firefly {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = (Math.random() - 0.5) * 0.8;
                this.alpha = 0;
                this.alphaSpeed = Math.random() * 0.02 + 0.01;
                this.phase = Math.random() * Math.PI * 2;
                this.glowSize = Math.random() * 20 + 10;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            }
            
            update() {
                this.x += this.speedX + Math.sin(this.wobble) * 0.3;
                this.y += this.speedY + Math.cos(this.wobble) * 0.2;
                this.wobble += this.wobbleSpeed;
                
                // 边界检查
                if (this.x < -50) this.x = canvas.width + 50;
                if (this.x > canvas.width + 50) this.x = -50;
                if (this.y < -50) this.y = canvas.height + 50;
                if (this.y > canvas.height + 50) this.y = -50;
                
                // 闪烁效果
                this.phase += this.alphaSpeed;
                this.alpha = (Math.sin(this.phase) + 1) / 2;
            }
            
            draw() {
                // 外层光晕
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.glowSize
                );
                gradient.addColorStop(0, `rgba(255, 255, 150, ${this.alpha * 0.4})`);
                gradient.addColorStop(0.4, `rgba(200, 255, 100, ${this.alpha * 0.2})`);
                gradient.addColorStop(1, 'rgba(100, 200, 50, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心光点
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.alpha * 0.9})`;
                ctx.fill();
                
                // 内层亮核
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 230, ${this.alpha})`;
                ctx.fill();
            }
        }
        
        // 竹子类
        class Bamboo {
            constructor(x, isForeground) {
                this.x = x;
                this.isForeground = isForeground;
                this.height = Math.random() * 300 + 400;
                this.width = isForeground ? Math.random() * 8 + 8 : Math.random() * 4 + 4;
                this.swayOffset = Math.random() * Math.PI * 2;
                this.swaySpeed = Math.random() * 0.005 + 0.003;
                this.segments = Math.floor(this.height / 40) + 3;
                this.color = isForeground ? 
                    `hsl(120, ${Math.random() * 20 + 25}%, ${Math.random() * 15 + 20}%)` :
                    `hsl(120, ${Math.random() * 15 + 15}%, ${Math.random() * 10 + 12}%)`;
            }
            
            draw(time) {
                const sway = Math.sin(time * this.swaySpeed + this.swayOffset) * (this.isForeground ? 8 : 4);
                
                ctx.save();
                ctx.translate(this.x, canvas.height);
                
                // 画竹子主干
                ctx.beginPath();
                ctx.moveTo(sway * 0.3, 0);
                ctx.quadraticCurveTo(
                    sway * 0.6, -this.height * 0.5,
                    sway, -this.height
                );
                ctx.lineWidth = this.width;
                ctx.strokeStyle = this.color;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // 画竹节
                for (let i = 1; i < this.segments; i++) {
                    const y = -this.height * i / this.segments;
                    const segmentSway = sway * i / this.segments;
                    
                    ctx.beginPath();
                    ctx.arc(segmentSway, y, this.width * 0.6, 0, Math.PI * 2);
                    ctx.strokeStyle = this.isForeground ? 
                        'rgba(100, 150, 80, 0.5)' : 'rgba(60, 90, 50, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 画竹叶
                    if (i > this.segments * 0.4) {
                        this.drawLeaf(segmentSway, y, sway, time);
                    }
                }
                
                ctx.restore();
            }
            
            drawLeaf(x, y, sway, time) {
                const leafCount = Math.floor(Math.random() * 2) + 1;
                for (let i = 0; i < leafCount; i++) {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const leafLength = this.isForeground ? 
                        Math.random() * 25 + 15 : Math.random() * 15 + 8;
                    const leafAngle = (side * Math.PI / 3) + Math.sin(time * 0.002 + y) * 0.1;
                    
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(leafAngle);
                    
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.quadraticCurveTo(
                        leafLength * 0.3, -leafLength * 0.2,
                        leafLength, -leafLength * 0.1
                    );
                    ctx.quadraticCurveTo(
                        leafLength * 0.5, -leafLength * 0.3,
                        0, 0
                    );
                    ctx.fillStyle = this.isForeground ? 
                        'rgba(100, 180, 80, 0.6)' : 'rgba(70, 120, 60, 0.4)';
                    ctx.fill();
                    
                    ctx.restore();
                }
            }
        }
        
        // 创建对象
        const fireflies = [];
        const bamboos = [];
        const fireflyCount = 80;
        
        // 初始化萤火虫
        for (let i = 0; i < fireflyCount; i++) {
            fireflies.push(new Firefly());
        }
        
        // 初始化竹子（背景层）
        for (let i = 0; i < 25; i++) {
            bamboos.push(new Bamboo(Math.random() * canvas.width, false));
        }
        
        // 初始化竹子（前景层）
        for (let i = 0; i < 15; i++) {
            bamboos.push(new Bamboo(Math.random() * canvas.width, true));
        }
        
        // 按前后排序
        bamboos.sort((a, b) => (a.isForeground ? 1 : 0) - (b.isForeground ? 1 : 0));
        
        // 绘制背景
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a100d');
            gradient.addColorStop(0.3, '#0d1812');
            gradient.addColorStop(0.7, '#0a1410');
            gradient.addColorStop(1, '#050806');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 月亮/月光
            const moonX = canvas.width * 0.7;
            const moonY = canvas.height * 0.15;
            const moonGradient = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 200);
            moonGradient.addColorStop(0, 'rgba(255, 255, 220, 0.15)');
            moonGradient.addColorStop(0.5, 'rgba(200, 220, 180, 0.05)');
            moonGradient.addColorStop(1, 'rgba(100, 120, 80, 0)');
            ctx.fillStyle = moonGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // 主循环
        function animate(time) {
            drawBackground();
            
            // 画竹子
            bamboos.forEach(bamboo => bamboo.draw(time));
            
            // 画萤火虫
            fireflies.forEach(firefly => {
                firefly.update();
                firefly.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate(0);
    </script>
</body>
</html>
