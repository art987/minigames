        // 初始化页面
        function initPage() {
            renderTips(salesTips);
        }
        
        // 渲染话术
        function renderTips(tips) {
            const container = document.getElementById('tipsContainer');
            container.innerHTML = tips.map(tip => `
                <div class="tip-card">
                    <div class="tip-header">
                        <div class="tip-number">第 ${tip.id} 句</div>
                    </div>
                    <div class="tip-content">
                        <div class="customer-question">
                            <h3>客户问题：</h3>
                            <p>${tip.question}</p>
                        </div>
                        <div class="sales-response">
                            <h3>销售回复：</h3>
                            <p>${tip.response}</p>
                            <button class="copy-btn" onclick="copyToClipboard('${tip.id}')">
                                <i class="fa fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="tip-note">${tip.note}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // 复制功能
        function copyToClipboard(tipId) {
            const tip = salesTips.find(t => t.id == tipId);
            if (tip) {
                const text = `客户问题：${tip.question}\n\n销售回复：${tip.response}\n\n${tip.note}`;
                navigator.clipboard.writeText(text).then(() => {
                    // 显示复制成功提示
                    const notice = document.getElementById('copyNotice');
                    notice.style.display = 'block';
                    setTimeout(() => {
                        notice.style.display = 'none';
                    }, 2000);
                    
                    // 改变按钮状态
                    const btn = document.querySelector(`.copy-btn[onclick="copyToClipboard('${tipId}')"]`);
                    btn.classList.add('copied');
                    btn.innerHTML = '<i class="fa fa-check"></i> 已复制';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.innerHTML = '<i class="fa fa-copy"></i> 复制';
                    }, 2000);
                }).catch(err => {
                    console.error('复制失败: ', err);
                });
            }
        }
        
        // 搜索功能
        function filterTips() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!searchTerm) {
                renderTips(salesTips);
                return;
            }
            
            const filteredTips = salesTips.filter(tip => {
                return tip.question.toLowerCase().includes(searchTerm) || 
                       tip.response.toLowerCase().includes(searchTerm) || 
                       tip.note.toLowerCase().includes(searchTerm);
            });
            
            renderTips(filteredTips);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initPage);
    </script>
