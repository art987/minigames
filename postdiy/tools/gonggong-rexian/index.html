        let currentSpeech = null;
        let currentSpeakBtn = null;

        function convertNumberToSpeech(number) {
            const digitMap = {
                '0': '零',
                '1': '幺',
                '2': '二',
                '3': '三',
                '4': '四',
                '5': '五',
                '6': '六',
                '7': '七',
                '8': '八',
                '9': '九'
            };
            
            return number.split('').map(digit => digitMap[digit] || digit).join('，');
        }

        // 检测是否在WebView环境中运行
        function isInWebView() {
            const ua = navigator.userAgent.toLowerCase();
            const isWebView = ua.indexOf('wv') > -1 || 
                              ua.indexOf('webview') > -1 ||
                              ua.indexOf('android') > -1 && ua.indexOf('chrome') === -1 ||
                              ua.indexOf('iphone') > -1 && ua.indexOf('safari') === -1;
            return isWebView;
        }

        // 更新按钮图标
        function updateButtonIcon(btn, isSpeaking) {
            const icon = btn.querySelector('.volume-icon');
            if (icon) {
                icon.src = isSpeaking ? 'mute.svg' : 'volume.svg';
            }
        }

        function speakHotline(name, number, note, btn) {
            if (currentSpeech) {
                window.speechSynthesis.cancel();
                if (typeof responsiveVoice !== 'undefined') {
                    responsiveVoice.cancel();
                }
                if (currentSpeakBtn) {
                    updateButtonIcon(currentSpeakBtn, false);
                    currentSpeakBtn.classList.remove('speaking');
                }
            }

            const spokenNumber = convertNumberToSpeech(number);
            const text = `${name}，电话号码是${spokenNumber}。${note}`;
            
            currentSpeakBtn = btn;
            updateButtonIcon(btn, true);
            btn.classList.add('speaking');

            const inWebView = isInWebView();
            
            // 在WebView中优先使用ResponsiveVoice
            if (inWebView && typeof responsiveVoice !== 'undefined' && typeof responsiveVoice.speak === 'function') {
                console.log('WebView环境：使用ResponsiveVoice');
                responsiveVoice.speak(text, 'Chinese Female', {
                    rate: 0.9,
                    pitch: 1,
                    onend: () => {
                        updateButtonIcon(btn, false);
                        btn.classList.remove('speaking');
                        currentSpeech = null;
                        currentSpeakBtn = null;
                    },
                    onerror: () => {
                        updateButtonIcon(btn, false);
                        btn.classList.remove('speaking');
                        currentSpeech = null;
                        currentSpeakBtn = null;
                    }
                });
            }
            // 使用Web Speech API
            else if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                utterance.pitch = 1;

                currentSpeech = utterance;

                utterance.onend = () => {
                    updateButtonIcon(btn, false);
                    btn.classList.remove('speaking');
                    currentSpeech = null;
                    currentSpeakBtn = null;
                };

                utterance.onerror = () => {
                    updateButtonIcon(btn, false);
                    btn.classList.remove('speaking');
                    currentSpeech = null;
                    currentSpeakBtn = null;
                };

                window.speechSynthesis.speak(utterance);
            }
            // 如果都不支持
            else {
                updateButtonIcon(btn, false);
                btn.classList.remove('speaking');
                alert('您的浏览器不支持语音朗读功能');
            }
        }

        // 科技感交互效果
        function addGlowEffect(element) {
            element.addEventListener('mouseenter', () => {
                element.style.boxShadow = '0 0 20px rgba(0, 150, 255, 0.5), 0 0 40px rgba(0, 150, 255, 0.3)';
            });
            element.addEventListener('mouseleave', () => {
                element.style.boxShadow = '';
            });
        }

        // 添加打字机效果
        function typeWriter(element, text, speed = 50) {
            let i = 0;
            element.textContent = '';
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

            // 创建热线卡片
            category.hotlines.forEach(hotline => {
                const hotlineCard = document.createElement('div');
                hotlineCard.classList.add('hotline-card');
                
                // 如果没有封面图片，添加no-cover类
                if (!hotline.cover) {
                    hotlineCard.classList.add('no-cover');
                }

                // 如果有封面图片，创建封面元素
                if (hotline.cover) {
                    const coverDiv = document.createElement('div');
                    coverDiv.classList.add('hotline-card-cover');
                    
                    const coverImg = document.createElement('img');
                    coverImg.src = hotline.cover;
                    coverImg.alt = hotline.name;
                    coverImg.loading = 'lazy';
                    coverDiv.appendChild(coverImg);
                    
                    // 创建朗读按钮并放在封面上
                    const speakBtn = document.createElement('button');
                    speakBtn.classList.add('speak-btn');
                    speakBtn.title = '点击朗读';
                    
                    // 创建音量图标
                    const volumeIcon = document.createElement('img');
                    volumeIcon.src = 'volume.svg';
                    volumeIcon.alt = '朗读';
                    volumeIcon.className = 'volume-icon';
                    speakBtn.appendChild(volumeIcon);
                    
                    speakBtn.onclick = (e) => {
                        e.stopPropagation();
                        speakHotline(hotline.name, hotline.number, hotline.note, speakBtn);
                    };
                    coverDiv.appendChild(speakBtn);
                    
                    hotlineCard.appendChild(coverDiv);
                }

                // 创建内容容器
                const contentDiv = document.createElement('div');
                contentDiv.classList.add('hotline-card-content');

                const hotlineName = document.createElement('h3');
                hotlineName.textContent = hotline.name;
                contentDiv.appendChild(hotlineName);

                const hotlineNumber = document.createElement('p');
                hotlineNumber.textContent = ``;
                
                const numberSpan = document.createElement('span');
                numberSpan.textContent = hotline.number;
                numberSpan.classList.add(hotline.longNumber ? 'hotline-number2' : 'hotline-number');
                hotlineNumber.appendChild(numberSpan);
                contentDiv.appendChild(hotlineNumber);

                const hotlineNote = document.createElement('p');
                hotlineNote.textContent = `${hotline.note}`;
                contentDiv.appendChild(hotlineNote);

                const callButton = document.createElement('button');
                callButton.textContent = "马上拨打";
                callButton.onclick = () => {
                    window.location.href = `tel:${hotline.number}`;
                };
                contentDiv.appendChild(callButton);

                hotlineCard.appendChild(contentDiv);
                categoryDiv.appendChild(hotlineCard);
            });

            hotlineContainer.appendChild(categoryDiv);

            // 创建导航按钮
            const navButton = document.createElement('button');
            navButton.textContent = category.category;
            navButton.onclick = () => {
                document.getElementById(`category-${index}`).scrollIntoView({ behavior: 'smooth' });
            };
            categoryNav.appendChild(navButton);
        });

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const searchStats = document.getElementById('searchStats');
        const searchSuggestions = document.getElementById('searchSuggestions');
        
        let allHotlines = [];
        hotlineData.forEach(category => {
            category.hotlines.forEach(hotline => {
                allHotlines.push({
                    ...hotline,
                    category: category.category
                });
            });
        });
        
        function performSearch(query) {
            if (!query.trim()) {
                searchSuggestions.classList.remove('visible');
                searchStats.classList.remove('visible');
                searchClear.classList.remove('visible');
                return;
            }
            
            const results = allHotlines.filter(hotline => {
                const searchText = `${hotline.name} ${hotline.number} ${hotline.note} ${hotline.category}`.toLowerCase();
                return searchText.includes(query.toLowerCase());
            });
            
            searchClear.classList.add('visible');
            
            if (results.length > 0) {
                searchStats.textContent = `找到 ${results.length} 个结果`;
                searchStats.classList.add('visible');
                
                searchSuggestions.innerHTML = '';
                results.slice(0, 10).forEach(hotline => {
                    const item = document.createElement('div');
                    item.classList.add('suggestion-item');
                    
                    let iconHtml = '';
                    if (hotline.cover) {
                        iconHtml = `
                            <div class="suggestion-icon">
                                <img src="${hotline.cover}" alt="${hotline.name}" onerror="this.parentElement.style.display='none'">
                            </div>
                        `;
                    }
                    
                    item.innerHTML = `
                        ${iconHtml}
                        <div class="suggestion-info">
                            <div class="suggestion-name">${highlightText(hotline.name, query)}</div>
                            <div class="suggestion-category">${hotline.category}</div>
                        </div>
                        <div class="suggestion-number">${highlightText(hotline.number, query)}</div>
                    `;
                    
                    item.addEventListener('click', () => {
                        const categoryIndex = hotlineData.findIndex(cat => cat.category === hotline.category);
                        if (categoryIndex !== -1) {
                            const categoryElement = document.getElementById(`category-${categoryIndex}`);
                            if (categoryElement) {
                                categoryElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                
                                const hotlineIndex = hotlineData[categoryIndex].hotlines.findIndex(h => h.number === hotline.number);
                                
                                setTimeout(() => {
                                    const cards = categoryElement.querySelectorAll('.hotline-card');
                                    if (cards[hotlineIndex]) {
                                        cards[hotlineIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                                        
                                        cards[hotlineIndex].style.boxShadow = '0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.5)';
                                        cards[hotlineIndex].style.transform = 'scale(1.02)';
                                        setTimeout(() => {
                                            cards[hotlineIndex].style.boxShadow = '';
                                            cards[hotlineIndex].style.transform = '';
                                        }, 2000);
                                    }
                                }, 300);
                            }
                            
                            searchInput.value = '';
                            searchSuggestions.classList.remove('visible');
                            searchStats.classList.remove('visible');
                            searchClear.classList.remove('visible');
                        }
                    });
                    
                    searchSuggestions.appendChild(item);
                });
                
                if (results.length > 10) {
                    const moreItem = document.createElement('div');
                    moreItem.classList.add('suggestion-item');
                    moreItem.innerHTML = `
                        <div class="suggestion-info">
                            <div class="suggestion-name" style="color: #00d4ff;">还有 ${results.length - 10} 个结果...</div>
                        </div>
                    `;
                    searchSuggestions.appendChild(moreItem);
                }
                
                searchSuggestions.classList.add('visible');
            } else {
                searchStats.textContent = '未找到结果';
                searchStats.classList.add('visible');
                searchSuggestions.innerHTML = '<div class="no-results">未找到匹配的热线</div>';
                searchSuggestions.classList.add('visible');
            }
        }
        
        function highlightText(text, query) {
            if (!query.trim()) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span style="color: #00ff88; font-weight: bold;">$1</span>');
        }
        
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch(e.target.value);
            }, 300);
        });
        
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim()) {
                performSearch(searchInput.value);
            }
        });
        
        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchSuggestions.classList.remove('visible');
            searchStats.classList.remove('visible');
            searchClear.classList.remove('visible');
            searchInput.focus();
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchSuggestions.classList.remove('visible');
            }
        });
        
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchSuggestions.classList.remove('visible');
                searchStats.classList.remove('visible');
                searchClear.classList.remove('visible');
            }
        });
        
        // 复制热搜词列表实现无限循环滚动
        const hotTagsList = document.getElementById('hotTagsList');
        if (hotTagsList) {
            const originalTags = Array.from(hotTagsList.children);
            originalTags.forEach(tag => {
                const clone = tag.cloneNode(true);
                hotTagsList.appendChild(clone);
            });
        }
        
        // 热搜词点击事件
        document.querySelectorAll('.hot-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const keyword = tag.dataset.keyword;
                searchInput.value = keyword;
                // 移除 focus，避免在移动端弹出键盘
                performSearch(keyword);
                
                // 添加点击动画效果
                tag.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    tag.style.transform = '';
                }, 150);
            });
        });

        // 添加滚动事件监听，更新导航样式
        window.addEventListener('scroll', () => {
            const categories = document.querySelectorAll('.category');
            categories.forEach((category, index) => {
                const rect = category.getBoundingClientRect();
                const navButtons = document.querySelectorAll('.nav button');

                if (rect.top <= 100 && rect.bottom >= 100) {
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    navButtons[index].classList.add('active');
                }
            });
            
            // 置顶按钮显示/隐藏
            const backToTop = document.getElementById('backToTop');
            if (backToTop) {
                if (window.scrollY > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            }
        });
        
        // 添加Intersection Observer用于卡片进入动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.hotline-card').forEach(card => {
            card.style.animationPlayState = 'paused';
            observer.observe(card);
        });

        // 添加鼠标跟随光效
        const cursor = document.createElement('div');
        cursor.style.cssText = `
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            transition: transform 0.3s ease-out;
        `;
        document.body.appendChild(cursor);

        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX - 150}px, ${e.clientY - 150}px)`;
        });

        // 添加数字脉冲动画
        document.querySelectorAll('.hotline-number').forEach(number => {
            number.addEventListener('mouseenter', () => {
                number.style.animation = 'none';
                number.offsetHeight;
                number.style.animation = 'numberPulse 0.5s ease-out';
            });
        });

        // 添加数字脉冲动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes numberPulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }
        `;
        document.head.appendChild(style);

        // 添加滚动进度条
        const progressBar = document.createElement('div');
        progressBar.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            z-index: 10000;
            transition: width 0.1s;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        `;
        document.body.appendChild(progressBar);

        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset;
            const docHeight = document.body.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            progressBar.style.width = scrollPercent + '%';
        });

        // 添加粒子效果
        function createParticle() {
            const particle = document.createElement('div');
            const size = Math.random() * 3 + 1;
            particle.style.cssText = `
                position: fixed;
                width: ${size}px;
                height: ${size}px;
                background: rgba(0, 212, 255, ${Math.random() * 0.5 + 0.2});
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
                left: ${Math.random() * window.innerWidth}px;
                top: ${window.innerHeight + 10}px;
                animation: particleFloat ${Math.random() * 3 + 2}s linear forwards;
            `;
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 5000);
        }

        // 添加粒子动画样式
        const particleStyle = document.createElement('style');
        particleStyle.textContent = `
            @keyframes particleFloat {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(-${window.innerHeight + 100}px) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(particleStyle);

        // 每隔一段时间创建粒子
        setInterval(createParticle, 300);
    </script>
    
    <!-- 置顶按钮 -->
    <div class="back-to-top" id="backToTop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 15l-6-6-6 6"></path>
        </svg>
    </div>
    
    <!-- 简洁模式按钮 -->
    <div class="simple-mode-btn" id="simpleModeBtn">
        <span>简</span>
    </div>
    
    <!-- 简洁模式弹窗 -->
    <div class="simple-modal" id="simpleModal">
        <div class="simple-modal-content">
            <div class="simple-modal-header">
                <h3>热线速查</h3>
                <div class="simple-modal-close" id="simpleModalClose">×</div>
            </div>
            <div class="simple-modal-body" id="simpleModalBody"></div>
        </div>
    </div>
    
    <script>
        // 置顶按钮点击事件
        console.log('=== 置顶按钮调试开始 ===');
        const backToTop = document.getElementById('backToTop');
        console.log('backToTop 元素:', backToTop);
        console.log('backToTop 是否存在:', !!backToTop);
        
        if (backToTop) {
            console.log('✅ 找到置顶按钮，开始添加事件监听');
            
            backToTop.addEventListener('click', (e) => {
                console.log('🔄 置顶按钮被点击了！');
                console.log('当前滚动位置:', window.pageYOffset);
                
                // 平滑滚动到顶部
                const startPosition = window.pageYOffset;
                const duration = 500;
                let startTime = null;
                
                function animation(currentTime) {
                    if (startTime === null) startTime = currentTime;
                    const timeElapsed = currentTime - startTime;
                    const progress = Math.min(timeElapsed / duration, 1);
                    const easeInOutQuad = progress < 0.5 
                        ? 2 * progress * progress 
                        : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    
                    const newPosition = startPosition * (1 - easeInOutQuad);
                    window.scrollTo(0, newPosition);
                    
                    console.log('滚动中... 位置:', newPosition);
                    
                    if (timeElapsed < duration) {
                        requestAnimationFrame(animation);
                    } else {
                        console.log('✅ 滚动完成！');
                    }
                }
                
                requestAnimationFrame(animation);
            });
            
            console.log('✅ 事件监听添加成功');
        } else {
            console.error('❌ 未找到置顶按钮元素！');
            console.log('DOM 中的所有元素:', document.querySelectorAll('*'));
        }
        
        console.log('=== 置顶按钮调试结束 ===');
        
        // 简洁模式按钮功能
        const simpleModeBtn = document.getElementById('simpleModeBtn');
        const simpleModal = document.getElementById('simpleModal');
        const simpleModalClose = document.getElementById('simpleModalClose');
        const simpleModalBody = document.getElementById('simpleModalBody');
        
        // 填充弹窗内容
        function populateSimpleModal() {
            simpleModalBody.innerHTML = '';
            
            hotlineData.forEach((category, categoryIndex) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.classList.add('simple-category');
                
                const categoryTitle = document.createElement('div');
                categoryTitle.classList.add('simple-category-title');
                categoryTitle.textContent = category.category;
                categoryDiv.appendChild(categoryTitle);
                
                const gridDiv = document.createElement('div');
                gridDiv.classList.add('simple-hotline-grid');
                
                category.hotlines.forEach((hotline, hotlineIndex) => {
                    const item = document.createElement('div');
                    item.classList.add('simple-hotline-item');
                    
                    item.innerHTML = `
                        <span class="simple-hotline-name">${hotline.name}</span>
                        <span class="simple-hotline-number">${hotline.number}</span>
                    `;
                    
                    item.addEventListener('click', () => {
                        simpleModal.classList.remove('visible');
                        
                        const categoryElement = document.getElementById(`category-${categoryIndex}`);
                        if (categoryElement) {
                            categoryElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            
                            setTimeout(() => {
                                const cards = categoryElement.querySelectorAll('.hotline-card');
                                if (cards[hotlineIndex]) {
                                    cards[hotlineIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    
                                    cards[hotlineIndex].style.boxShadow = '0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.5)';
                                    cards[hotlineIndex].style.transform = 'scale(1.02)';
                                    setTimeout(() => {
                                        cards[hotlineIndex].style.boxShadow = '';
                                        cards[hotlineIndex].style.transform = '';
                                    }, 2000);
                                }
                            }, 300);
                        }
                    });
                    
                    gridDiv.appendChild(item);
                });
                
                categoryDiv.appendChild(gridDiv);
                simpleModalBody.appendChild(categoryDiv);
            });
        }
        
        // 显示/隐藏简洁模式按钮
        window.addEventListener('scroll', () => {
            if (simpleModeBtn) {
                if (window.scrollY > 300) {
                    simpleModeBtn.classList.add('visible');
                } else {
                    simpleModeBtn.classList.remove('visible');
                }
            }
        });
        
        // 打开弹窗
        if (simpleModeBtn) {
            simpleModeBtn.addEventListener('click', () => {
                populateSimpleModal();
                simpleModal.classList.add('visible');
            });
        }
        
        // 关闭弹窗
        if (simpleModalClose) {
            simpleModalClose.addEventListener('click', () => {
                simpleModal.classList.remove('visible');
            });
        }
        
        // 点击弹窗外部关闭
        if (simpleModal) {
            simpleModal.addEventListener('click', (e) => {
                if (e.target === simpleModal) {
                    simpleModal.classList.remove('visible');
                }
            });
        }
        
        // ESC键关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && simpleModal) {
                simpleModal.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
