<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2 图片同步工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 32px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 4px;
    }
    .content {
      padding: 24px 32px;
    }
    .options {
      margin-bottom: 20px;
    }
    .option-row {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    label {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    input[type="text"], select {
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      min-width: 200px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #e0e0e0;
    }
    .btn-danger {
      background: #ff4757;
      color: white;
    }
    .btn-danger:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
    }
    .log-container {
      margin-top: 24px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      height: 300px;
      display: flex;
      flex-direction: column;
    }
    .log-header {
      background: #f8f9fa;
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .log-line {
      margin-bottom: 2px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line.error {
      color: #f44747;
    }
    .log-line.success {
      color: #4ec9b0;
    }
    .log-line.warning {
      color: #dcdcaa;
    }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.running {
      display: block;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      color: #856404;
    }
    .status.success {
      display: block;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .quick-dirs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .quick-dir {
      padding: 6px 12px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .quick-dir:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖼️ R2 图片同步工具</h1>
      <p>一键同步本地图片到 Cloudflare R2 存储桶</p>
    </div>
    
    <div class="content">
      <div class="options">
        <div class="option-row">
          <label>同步目录：</label>
          <input type="text" id="dirInput" placeholder="留空同步全部，如 xiaoshu">
          <div class="quick-dirs">
            <span class="quick-dir" data-dir="">全部</span>
            <span class="quick-dir" data-dir="xiaoshu">小暑</span>
            <span class="quick-dir" data-dir="dashu">大暑</span>
            <span class="quick-dir" data-dir="520">520</span>
            <span class="quick-dir" data-dir="statics">静态</span>
          </div>
        </div>
        
        <div class="option-row">
          <label><input type="checkbox" id="dryRunCheck"> 预览模式（只看不上传）</label>
          <label><input type="checkbox" id="verboseCheck"> 详细输出</label>
          <label><input type="checkbox" id="deleteCheck"> 删除 R2 独有文件（谨慎）</label>
        </div>
      </div>
      
      <div class="btn-group">
        <button id="syncBtn" class="btn-primary">
          <span class="spinner" style="display:none;"></span>
          <span>开始同步</span>
        </button>
        <button id="previewBtn" class="btn-secondary">
          预览模式
        </button>
        <button id="clearBtn" class="btn-secondary">
          清空日志
        </button>
      </div>
      
      <div class="status" id="status"></div>
      
      <div class="log-container">
        <div class="log-header">
          <span>同步日志</span>
          <span id="logCount">0 行</span>
        </div>
        <div class="log-body" id="logBody"></div>
      </div>
    </div>
  </div>

  <script>
    const syncBtn = document.getElementById('syncBtn');
    const previewBtn = document.getElementById('previewBtn');
    const clearBtn = document.getElementById('clearBtn');
    const dirInput = document.getElementById('dirInput');
    const dryRunCheck = document.getElementById('dryRunCheck');
    const verboseCheck = document.getElementById('verboseCheck');
    const deleteCheck = document.getElementById('deleteCheck');
    const logBody = document.getElementById('logBody');
    const logCount = document.getElementById('logCount');
    const status = document.getElementById('status');
    const spinner = syncBtn.querySelector('.spinner');
    const btnText = syncBtn.querySelector('span:last-child');

    let eventSource = null;
    let isRunning = false;

    document.querySelectorAll('.quick-dir').forEach(el => {
      el.addEventListener('click', () => {
        dirInput.value = el.dataset.dir;
      });
    });

    previewBtn.addEventListener('click', () => {
      dryRunCheck.checked = true;
      startSync();
    });

    syncBtn.addEventListener('click', () => {
      if (!isRunning) {
        startSync();
      } else {
        stopSync();
      }
    });

    clearBtn.addEventListener('click', () => {
      logBody.innerHTML = '';
      logCount.textContent = '0 行';
      status.style.display = 'none';
    });

    function startSync() {
      if (isRunning) return;
      
      const dir = dirInput.value.trim();
      const dryRun = dryRunCheck.checked;
      const verbose = verboseCheck.checked;
      
      isRunning = true;
      syncBtn.disabled = true;
      previewBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = '同步中...';
      logBody.innerHTML = '';
      logCount.textContent = '0 行';
      
      status.className = 'status running';
      status.textContent = dryRun ? '🔍 预览模式：正在扫描文件...' : '🚀 同步中...';

      const params = new URLSearchParams();
      if (dir) params.set('dir', dir);
      if (dryRun) params.set('dryRun', 'true');
      if (verbose) params.set('verbose', 'true');
      
      eventSource = new EventSource(`/sync?${params.toString()}`);
      
      eventSource.addEventListener('log', (e) => {
        const data = JSON.parse(e.data);
        addLog(data);
      });
      
      eventSource.addEventListener('error', (e) => {
        const data = JSON.parse(e.data);
        addLog(data, 'error');
      });
      
      eventSource.addEventListener('close', (e) => {
        const data = JSON.parse(e.data);
        eventSource.close();
        
        isRunning = false;
        syncBtn.disabled = false;
        previewBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = '开始同步';
        
        if (data.code === 0) {
          status.className = 'status success';
          status.textContent = '✅ 同步完成！';
          addLog('=== 同步完成 ===', 'success');
        } else {
          status.className = 'status error';
          status.textContent = `❌ 同步失败（退出码: ${data.code}）`;
          addLog(`=== 同步失败，退出码: ${data.code} ===`, 'error');
        }
      });
      
      eventSource.onerror = () => {
        eventSource.close();
        isRunning = false;
        syncBtn.disabled = false;
        previewBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = '开始同步';
        status.className = 'status error';
        status.textContent = '❌ 连接失败，请检查服务是否启动';
      };
    }

    function stopSync() {
      if (eventSource) {
        eventSource.close();
      }
      isRunning = false;
      syncBtn.disabled = false;
      previewBtn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '开始同步';
      status.className = 'status error';
      status.textContent = '⏹️ 同步已取消';
    }

    function addLog(text, type = 'info') {
      const line = document.createElement('div');
      line.className = 'log-line' + (type ? ` ${type}` : '');
      
      if (type === 'success' && text.includes('✅')) {
        line.className = 'log-line success';
      } else if (type === 'error' || text.includes('❌')) {
        line.className = 'log-line error';
      } else if (text.includes('⚠️') || text.includes('警告')) {
        line.className = 'log-line warning';
      }
      
      line.textContent = text;
      logBody.appendChild(line);
      logBody.scrollTop = logBody.scrollHeight;
      
      const count = parseInt(logCount.textContent) + 1;
      logCount.textContent = `${count} 行`;
    }
  </script>
</body>
</html>
