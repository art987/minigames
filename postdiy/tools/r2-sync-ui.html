<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双云图片同步工具</title>
  <style>
    * {    
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 32px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 4px;
    }
    .content {
      padding: 24px 32px;
    }
    .options {
      margin-bottom: 20px;
    }
    .option-row {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .option-row > label {
      font-size: 14px;
      color: #333;
      font-weight: 500;
      min-width: 80px;
    }
    input[type="text"], select {
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      min-width: 200px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* 云选择卡片 */
    .cloud-selector {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cloud-card {
      flex: 1;
      min-width: 200px;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      position: relative;
    }
    .cloud-card:hover {
      border-color: #667eea;
      background: #f5f5ff;
    }
    .cloud-card.active {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }
    .cloud-card.active::after {
      content: '✓';
      position: absolute;
      top: 8px;
      right: 12px;
      width: 22px;
      height: 22px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
    .cloud-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .cloud-card-desc {
      font-size: 12px;
      color: #666;
    }
    .cloud-card-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #e8eaf6;
      color: #3f51b5;
      border-radius: 10px;
      font-size: 11px;
      margin-top: 6px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #e0e0e0;
    }
    .btn-danger {
      background: #ff4757;
      color: white;
    }
    .btn-danger:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
    }

    .log-container {
      margin-top: 24px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      height: 360px;
      display: flex;
      flex-direction: column;
    }
    .log-header {
      background: #f8f9fa;
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .log-line {
      margin-bottom: 2px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line.error {
      color: #f44747;
    }
    .log-line.success {
      color: #4ec9b0;
    }
    .log-line.warning {
      color: #dcdcaa;
    }
    .log-line.section {
      color: #c586c0;
      font-weight: bold;
    }
    .log-line.info {
      color: #9cdcfe;
    }

    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.running {
      display: block;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      color: #856404;
    }
    .status.success {
      display: block;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .quick-dirs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .quick-dir {
      padding: 6px 12px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .quick-dir:hover {
      background: #e0e0e0;
    }
    .quick-dir.active {
      background: #667eea;
      color: white;
    }
    .help-text {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖼️ 双云图片同步工具</h1>
      <p>一键同步本地图片到 Cloudflare R2 + 七牛云</p>
    </div>

    <div class="content">
      <!-- 云选择 -->
      <div class="options">
        <div class="option-row" style="align-items: flex-start;">
          <label>选择云：</label>
          <div class="cloud-selector" style="flex: 1;">
            <div class="cloud-card active" data-cloud="both">
              <div class="cloud-card-title">⚡ 双云同步</div>
              <div class="cloud-card-desc">同时上传到 R2 + 七牛</div>
              <span class="cloud-card-badge">推荐</span>
            </div>
            <div class="cloud-card" data-cloud="r2">
              <div class="cloud-card-title">☁️ Cloudflare R2</div>
              <div class="cloud-card-desc">海外 CDN，postdiy 存储桶</div>
              <span class="cloud-card-badge">R2</span>
            </div>
            <div class="cloud-card" data-cloud="qiniu">
              <div class="cloud-card-title">🚀 七牛云</div>
              <div class="cloud-card-desc">国内 CDN，posterbg 存储桶</div>
              <span class="cloud-card-badge">国内加速</span>
            </div>
          </div>
        </div>

        <!-- 同步目录 -->
        <div class="option-row">
          <label>同步目录：</label>
          <input type="text" id="dirInput" placeholder="留空同步全部，如 xiaoshu">
        </div>
        <div class="quick-dirs" style="margin-left: 92px;">
          <span class="quick-dir active" data-dir="">全部</span>
          <span class="quick-dir" data-dir="xiaoshu">小暑</span>
          <span class="quick-dir" data-dir="dashu">大暑</span>
          <span class="quick-dir" data-dir="520">520</span>
          <span class="quick-dir" data-dir="statics">静态</span>
        </div>

        <!-- 选项 -->
        <div class="option-row" style="margin-top: 16px;">
          <label>选项：</label>
          <label><input type="checkbox" id="dryRunCheck"> 预览模式（只看不上传）</label>
          <label><input type="checkbox" id="verboseCheck" checked> 详细输出</label>
        </div>
      </div>

      <div class="btn-group">
        <button id="syncBtn" class="btn-primary">
          <span class="spinner" style="display:none;"></span>
          <span>开始同步</span>
        </button>
        <button id="previewBtn" class="btn-secondary">
          预览模式
        </button>
        <button id="clearBtn" class="btn-secondary">
          清空日志
        </button>
      </div>

      <div class="status" id="status"></div>

      <div class="log-container">
        <div class="log-header">
          <span>同步日志</span>
          <span id="logCount">0 行</span>
        </div>
        <div class="log-body" id="logBody"></div>
      </div>

      <div class="help-text" style="margin-top: 16px;">
        💡 提示：双云同步会先上传到 R2，再上传到七牛云。同名文件会自动覆盖更新（基于文件大小检测）。
      </div>
    </div>
  </div>

  <script>
    const syncBtn = document.getElementById('syncBtn');
    const previewBtn = document.getElementById('previewBtn');
    const clearBtn = document.getElementById('clearBtn');
    const dirInput = document.getElementById('dirInput');
    const dryRunCheck = document.getElementById('dryRunCheck');
    const verboseCheck = document.getElementById('verboseCheck');
    const logBody = document.getElementById('logBody');
    const logCount = document.getElementById('logCount');
    const status = document.getElementById('status');
    const spinner = syncBtn.querySelector('.spinner');
    const btnText = syncBtn.querySelector('span:last-child');

    let eventSource = null;
    let isRunning = false;
    let selectedCloud = 'both';

    // 云选择切换
    document.querySelectorAll('.cloud-card').forEach(el => {
      el.addEventListener('click', () => {
        if (isRunning) return;
        document.querySelectorAll('.cloud-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedCloud = el.dataset.cloud;
      });
    });

    // 快捷目录
    document.querySelectorAll('.quick-dir').forEach(el => {
      el.addEventListener('click', () => {
        if (isRunning) return;
        document.querySelectorAll('.quick-dir').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        dirInput.value = el.dataset.dir;
      });
    });

    previewBtn.addEventListener('click', () => {
      dryRunCheck.checked = true;
      startSync();
    });

    syncBtn.addEventListener('click', () => {
      if (!isRunning) {
        startSync();
      } else {
        stopSync();
      }
    });

    clearBtn.addEventListener('click', () => {
      logBody.innerHTML = '';
      logCount.textContent = '0 行';
      status.style.display = 'none';
    });

    function startSync() {
      if (isRunning) return;

      const dir = dirInput.value.trim();
      const dryRun = dryRunCheck.checked;
      const verbose = verboseCheck.checked;

      isRunning = true;
      syncBtn.disabled = true;
      previewBtn.disabled = true;
      document.querySelectorAll('.cloud-card').forEach(c => c.style.pointerEvents = 'none');
      document.querySelectorAll('.quick-dir').forEach(d => d.style.pointerEvents = 'none');
      spinner.style.display = 'block';
      btnText.textContent = '同步中...';
      logBody.innerHTML = '';
      logCount.textContent = '0 行';

      const cloudLabel = {
        'both': '双云 (R2 + 七牛)',
        'r2': 'Cloudflare R2',
        'qiniu': '七牛云'
      }[selectedCloud];

      status.className = 'status running';
      status.textContent = dryRun
        ? `🔍 [${cloudLabel}] 预览模式：正在扫描文件...`
        : `🚀 [${cloudLabel}] 同步中...`;

      const params = new URLSearchParams();
      if (dir) params.set('dir', dir);
      if (dryRun) params.set('dryRun', 'true');
      if (verbose) params.set('verbose', 'true');
      if (selectedCloud !== 'both') params.set('cloud', selectedCloud);

      eventSource = new EventSource(`/sync?${params.toString()}`);

      eventSource.addEventListener('log', (e) => {
        const data = JSON.parse(e.data);
        addLog(data);
      });

      eventSource.addEventListener('error', (e) => {
        const data = JSON.parse(e.data);
        addLog(data, 'error');
      });

      eventSource.addEventListener('close', (e) => {
        const data = JSON.parse(e.data);
        eventSource.close();

        isRunning = false;
        syncBtn.disabled = false;
        previewBtn.disabled = false;
        document.querySelectorAll('.cloud-card').forEach(c => c.style.pointerEvents = '');
        document.querySelectorAll('.quick-dir').forEach(d => d.style.pointerEvents = '');
        spinner.style.display = 'none';
        btnText.textContent = '开始同步';

        if (data.code === 0) {
          status.className = 'status success';
          status.textContent = `✅ [${cloudLabel}] 同步完成！`;
          addLog(`=== [${cloudLabel}] 同步完成 ===`, 'success');
        } else {
          status.className = 'status error';
          status.textContent = `❌ [${cloudLabel}] 同步失败（退出码: ${data.code}）`;
          addLog(`=== [${cloudLabel}] 同步失败，退出码: ${data.code} ===`, 'error');
        }
      });

      eventSource.onerror = () => {
        eventSource.close();
        isRunning = false;
        syncBtn.disabled = false;
        previewBtn.disabled = false;
        document.querySelectorAll('.cloud-card').forEach(c => c.style.pointerEvents = '');
        document.querySelectorAll('.quick-dir').forEach(d => d.style.pointerEvents = '');
        spinner.style.display = 'none';
        btnText.textContent = '开始同步';
        status.className = 'status error';
        status.textContent = '❌ 连接失败，请检查服务是否启动';
      };
    }

    function stopSync() {
      if (eventSource) {
        eventSource.close();
      }
      isRunning = false;
      syncBtn.disabled = false;
      previewBtn.disabled = false;
      document.querySelectorAll('.cloud-card').forEach(c => c.style.pointerEvents = '');
      document.querySelectorAll('.quick-dir').forEach(d => d.style.pointerEvents = '');
      spinner.style.display = 'none';
      btnText.textContent = '开始同步';
      status.className = 'status error';
      status.textContent = '⏹️ 同步已取消';
    }

    function addLog(text, type = 'info') {
      const line = document.createElement('div');

      // 智能识别日志类型
      if (type === 'success' || text.includes('✅')) {
        line.className = 'log-line success';
      } else if (type === 'error' || text.includes('❌')) {
        line.className = 'log-line error';
      } else if (text.includes('⚠️') || text.includes('警告')) {
        line.className = 'log-line warning';
      } else if (text.includes('####') || text.includes('========') || text.includes('配置:') || text.includes('总结')) {
        line.className = 'log-line section';
      } else if (text.startsWith('  ')) {
        line.className = 'log-line info';
      } else {
        line.className = 'log-line';
      }

      line.textContent = text;
      logBody.appendChild(line);
      logBody.scrollTop = logBody.scrollHeight;

      const count = parseInt(logCount.textContent) + 1;
      logCount.textContent = `${count} 行`;
    }
  </script>
</body>
</html>
