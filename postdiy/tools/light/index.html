<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SVG神光卡片系统</title>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{margin:0;padding:0;background:#0b0b0f;color:#fff;font-family:Arial,sans-serif}
#gallery{padding:20px}
.card{display:inline-block;width:23%;margin:1%;background:#15151d;border:1px solid #333;padding:10px;cursor:pointer;border-radius:10px;text-align:center;vertical-align:top}
.card img{width:100%;height:120px;display:block;margin:0 auto}
.card div{margin-top:8px}
#viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;z-index:9999;text-align:center}
#effectLayer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
#svgLayer{position:absolute;top:50%;left:50%;width:400px;height:400px;margin-left:-200px;margin-top:-200px;z-index:2}
#svgLayer svg{width:100%;height:100%}
.light-rays{position:absolute;top:50%;left:50%;width:600px;height:600px;margin-left:-300px;margin-top:-300px;border-radius:50%;
background:repeating-conic-gradient(rgba(255,215,0,0.9) 0deg,rgba(255,215,0,0.2) 2deg,transparent 6deg);
filter:blur(6px);animation:rot 20s linear infinite}
@keyframes rot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.glow{filter:drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 40px #ffcc55) drop-shadow(0 0 60px #ff9933)}
.pulse-glow{animation:pulse 2s infinite ease-in-out}
@keyframes pulse{
0%{filter:drop-shadow(0 0 5px #ffd700) drop-shadow(0 0 10px #ffd700)}
50%{filter:drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 40px #ffd700)}
100%{filter:drop-shadow(0 0 5px #ffd700) drop-shadow(0 0 10px #ffd700)}
}
.particle{position:absolute;width:4px;height:4px;background:#ffd86a;border-radius:50%;box-shadow:0 0 10px #ffd86a}
.close-hint{position:fixed;top:20px;right:20px;color:#fff;font-size:14px;z-index:10000}
</style>
</head>
<body>

<div id="gallery"></div>

<div id="viewer">
<div class="close-hint">点击任意位置关闭</div>
<div id="effectLayer"></div>
<div id="svgLayer"></div>
</div>

<script src="config/effects.js"></script>
<script src="js/effects.js"></script>
<script src="js/app.js"></script>

</body>
</html>
