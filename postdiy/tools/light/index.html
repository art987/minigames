<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>道教祈福壁纸全集·108愿</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="page-header">
  <h1 class="page-title">
    <span class="title-icon">☯</span>
    <span class="title-zh">道教祈福壁纸全集</span>
  </h1>
  <span class="title-sub">108愿 · 12大主题 · 吉祥如意</span>
</header>

<nav class="category-nav" id="categoryNav">
  <div class="nav-inner">
    <button class="nav-btn active" data-category="all">
      <span class="nav-icon">🌟</span>
      <span class="nav-name">全部</span>
    </button>
  </div>
</nav>

<main class="gallery-wrap">
  <div id="gallery"></div>
</main>

<footer class="page-footer">
  ✨ 福生无量天尊 · 吉祥永随 ✨
</footer>

<div id="viewer">
  <div class="close-btn" id="closeBtn">×</div>
  
  <!-- 右侧按钮组 -->
  <div class="viewer-controls">
    <div class="control-btn mute-btn" id="muteBtn">音</div>
    <button class="control-btn detail-btn" id="detailBtn">
      <span class="detail-text">详情</span>
    </button>
    <button class="control-btn download-btn" id="downloadBtn">
      <span class="download-text">下载</span>
    </button>
  </div>
  
  <div class="card-container active" id="cardContainer1">
    <div class="svg-layer" id="svgLayer1"></div>
    <div class="effect-layer" id="effectLayer1"></div>
    <div class="lightning-layer" id="lightningLayer1"></div>
  </div>
  <div class="card-container" id="cardContainer2">
    <div class="svg-layer" id="svgLayer2"></div>
    <div class="effect-layer" id="effectLayer2"></div>
    <div class="lightning-layer" id="lightningLayer2"></div>
  </div>
</div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-content">
    <button class="detail-close" id="detailClose" onclick="closeDetailPanel()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    
    <div class="detail-decoration-top">
      <span class="decoration-star left">✦</span>
      <span class="decoration-star center">✧</span>
      <span class="decoration-star right">✦</span>
    </div>
    
    <div class="detail-body">
      <div class="title-decoration">
        <span class="decoration-line left"></span>
        <h2 class="detail-main-title" id="detailMainTitle">元始天尊</h2>
        <span class="decoration-line right"></span>
      </div>
      
      <p class="detail-sub-title" id="detailSubTitle">玉清圣境元始天尊</p>
      
      <div class="blessing-decoration">
        <span class="decoration-dot left">◆</span>
        <p class="blessing-text" id="detailBlessing">大道护佑 万事顺遂</p>
        <span class="decoration-dot right">◆</span>
      </div>
      
      <div class="intro-wrapper">
        <div class="intro-corner top-left"></div>
        <div class="intro-corner top-right"></div>
        <p class="intro-text" id="detailIntro"></p>
        <div class="intro-corner bottom-left"></div>
        <div class="intro-corner bottom-right"></div>
      </div>
    </div>
    
    <div class="detail-decoration-bottom">
      <span class="decoration-star left">✦</span>
      <span class="decoration-star center">✧</span>
      <span class="decoration-star right">✦</span>
    </div>
  </div>
</div>

<script src="config/effects.js"></script>
<script src="js/effects.js"></script>
<script src="js/app.js"></script>

</body>
</html>
