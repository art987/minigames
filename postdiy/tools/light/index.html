<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>神光卡片 · 灵符瑞兽图鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="page-header">
    <div class="header-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    <div class="header-content">
        <div class="logo-row">
            <span class="logo-icon">☯</span>
            <span class="logo-text">神光图鉴</span>
        </div>
        <h1 class="page-title">
            <span class="title-zh">灵符瑞兽</span>
            <span class="title-sub">神光卡牌 · 玄门至宝</span>
        </h1>
        <p class="page-desc">汇集上古神兽与玄门符箓，开启神光庇佑之旅</p>
        <div class="header-stats">
            <div class="stat-item">
                <span class="stat-num" id="statTotal">0</span>
                <span class="stat-label">藏品</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-num" id="statCategory">0</span>
                <span class="stat-label">分类</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-num">∞</span>
                <span class="stat-label">神光</span>
            </div>
        </div>
    </div>
</header>

<nav class="category-nav" id="categoryNav">
    <div class="nav-inner">
        <button class="nav-btn active" data-category="all">
            <span class="nav-icon">🌟</span>
            <span class="nav-name">全部</span>
        </button>
    </div>
</nav>

<main class="gallery-wrap">
    <div id="gallery"></div>
</main>

<footer class="page-footer">
    <p>✨ 滑动浏览 · 点击查看神光 ✨</p>
</footer>

<div id="viewer">
<div class="close-btn" id="closeBtn">×</div>
<div class="close-hint">点击任意位置关闭</div>
<div class="nav-hint">左右滑动切换</div>
<div class="mute-btn" id="muteBtn">🔊</div>
<div class="card-container active" id="cardContainer1">
<div class="svg-layer" id="svgLayer1"></div>
<div class="effect-layer" id="effectLayer1"></div>
<div class="lightning-layer" id="lightningLayer1"></div>
</div>
<div class="card-container" id="cardContainer2">
<div class="svg-layer" id="svgLayer2"></div>
<div class="effect-layer" id="effectLayer2"></div>
<div class="lightning-layer" id="lightningLayer2"></div>
</div>
</div>

<script src="config/effects.js"></script>
<script src="js/effects.js"></script>
<script src="js/app.js"></script>

</body>
</html>
