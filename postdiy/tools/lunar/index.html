<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日黄历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .date-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .date-input {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .date-input:hover {
            border-color: #667eea;
        }

        .date-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .lunar-date {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lunar-date .date-text {
            font-size: 28px;
            color: #f5576c;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .lunar-date .gan-zhi {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
        }

        .lunar-date .gan-zhi span {
            margin: 0 5px;
            padding: 4px 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
            display: inline-block;
            margin-top: 5px;
        }

        .info-section {
            background: rgba(102, 126, 234, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease;
            animation-fill-mode: both;
        }

        .info-section:nth-child(2) { animation-delay: 0.1s; }
        .info-section:nth-child(3) { animation-delay: 0.2s; }
        .info-section:nth-child(4) { animation-delay: 0.3s; }
        .info-section:nth-child(5) { animation-delay: 0.4s; }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            margin-right: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .info-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .info-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .yi-ji-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .yi-box, .ji-box {
            padding: 20px;
            border-radius: 12px;
            min-height: 150px;
        }

        .yi-box {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .ji-box {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .box-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .yi-box .box-title {
            color: #4CAF50;
        }

        .ji-box .box-title {
            color: #f5576c;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .tag {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
            animation: tagAppear 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation-fill-mode: both;
        }

        .tag:nth-child(1) { animation-delay: 0.5s; }
        .tag:nth-child(2) { animation-delay: 0.6s; }
        .tag:nth-child(3) { animation-delay: 0.7s; }
        .tag:nth-child(4) { animation-delay: 0.8s; }
        .tag:nth-child(5) { animation-delay: 0.9s; }
        .tag:nth-child(6) { animation-delay: 1.0s; }
        .tag:nth-child(7) { animation-delay: 1.1s; }
        .tag:nth-child(8) { animation-delay: 1.2s; }
        .tag:nth-child(9) { animation-delay: 1.3s; }
        .tag:nth-child(10) { animation-delay: 1.4s; }

        @keyframes tagAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .tag:hover {
            transform: scale(1.1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .pengzu-section {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .pengzu-text {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
        }

        .jishen-section, .xiongsha-section {
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .jishen-section {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .xiongsha-section {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .empty-text {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 28px;
            }

            .yi-ji-section {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">今日黄历</h1>
        </div>

        <div class="date-selector">
            <input type="date" id="dateInput" class="date-input">
            <button onclick="updateHuangli()" class="btn btn-primary">查看</button>
        </div>

        <div id="huangliContent">
            <div class="loading">加载中</div>
        </div>
    </div>

    <script src="lunar.js"></script>
    <script>
        // 设置日期选择器的默认值为今天
        const dateInput = document.getElementById('dateInput');
        const today = new Date();
        dateInput.value = today.toISOString().split('T')[0];

        // 页面加载时显示今日黄历
        window.onload = function() {
            updateHuangli();
        };

        function updateHuangli() {
            const selectedDate = new Date(dateInput.value);
            const lunar = Lunar.fromDate(selectedDate);
            const solar = lunar.getSolar();

            // 获取黄历信息
            const lunarDate = lunar.toString(); // 农历日期
            const yearGanZhi = lunar.getYearInGanZhi(); // 年干支
            const yearShengXiao = lunar.getYearShengXiao(); // 生肖
            const monthGanZhi = lunar.getMonthInGanZhi(); // 月干支
            const dayGanZhi = lunar.getDayInGanZhi(); // 日干支
            const week = solar.toFullString().split(' ')[2]; // 星期

            // 五行纳音
            const dayNaYin = lunar.getDayNaYin();

            // 冲煞
            const chong = lunar.getChong();
            const chongDesc = lunar.getChongDesc();
            const sha = lunar.getSha();

            // 彭祖百忌
            const pengZuGan = lunar.getPengZuGan();
            const pengZuZhi = lunar.getPengZuZhi();

            // 喜神、福神、财神方位
            const xiShen = lunar.getDayPositionXiDesc();
            const fuShen = lunar.getDayPositionFuDesc();
            const caiShen = lunar.getDayPositionCaiDesc();

            // 宜忌
            const yi = lunar.getDayYi();
            const ji = lunar.getDayJi();

            // 吉神凶煞
            const jiShen = lunar.getDayJiShen();
            const xiongSha = lunar.getDayXiongSha();

            // 构建HTML
            let html = `
                <div class="lunar-date">
                    <div class="date-text">${lunarDate}</div>
                    <div class="gan-zhi">
                        <span>${yearGanZhi}${yearShengXiao}年</span>
                        <span>${monthGanZhi}月</span>
                        <span>${dayGanZhi}日</span>
                        <span>${week}</span>
                    </div>
                </div>

                <div class="info-section">
                    <div class="section-title">基本信息</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">五行</div>
                            <div class="info-value">${dayNaYin}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">冲煞</div>
                            <div class="info-value">${chongDesc} 煞${sha}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">喜神</div>
                            <div class="info-value">${xiShen}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">福神</div>
                            <div class="info-value">${fuShen}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">财神</div>
                            <div class="info-value">${caiShen}</div>
                        </div>
                    </div>
                </div>

                <div class="info-section pengzu-section">
                    <div class="section-title">彭祖百忌</div>
                    <div class="pengzu-text">
                        ${pengZuGan}<br>${pengZuZhi}
                    </div>
                </div>

                <div class="info-section">
                    <div class="section-title">今日宜忌</div>
                    <div class="yi-ji-section">
                        <div class="yi-box">
                            <div class="box-title">宜</div>
                            <div class="tag-container">
                                ${yi.length > 0 ? yi.map(item => `<div class="tag">${item}</div>`).join('') : '<div class="empty-text">诸事皆宜</div>'}
                            </div>
                        </div>
                        <div class="ji-box">
                            <div class="box-title">忌</div>
                            <div class="tag-container">
                                ${ji.length > 0 ? ji.map(item => `<div class="tag">${item}</div>`).join('') : '<div class="empty-text">无</div>'}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="section-title">吉神凶煞</div>
                    <div class="jishen-section">
                        <div class="box-title" style="font-size: 16px; margin-bottom: 10px;">吉神宜趋</div>
                        <div class="tag-container">
                            ${jiShen.length > 0 ? jiShen.map(item => `<div class="tag">${item}</div>`).join('') : '<div class="empty-text">无</div>'}
                        </div>
                    </div>
                    <div class="xiongsha-section">
                        <div class="box-title" style="font-size: 16px; margin-bottom: 10px;">凶煞宜忌</div>
                        <div class="tag-container">
                            ${xiongSha.length > 0 ? xiongSha.map(item => `<div class="tag">${item}</div>`).join('') : '<div class="empty-text">无</div>'}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('huangliContent').innerHTML = html;
        }
    </script>
</body>
</html>
