    <!-- 初始化脚本 -->
    <script>
    (function() {
        function getShowCategoryFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('showCategory');
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            const categories = window.TestConfig.getAllCategories();
            const order = window.TestConfig.categoryOrder || Object.keys(categories);

            container.innerHTML = '';

            // 按指定顺序渲染分类
            order.forEach(function(categoryKey) {
                const category = categories[categoryKey];
                if (!category) return;

                const testCount = window.TestConfig.getTestCountByCategory(categoryKey);

                const card = document.createElement('div');
                card.className = 'category-card';
                card.dataset.category = categoryKey;

                const icon = document.createElement('div');
                icon.className = 'category-icon';
                icon.textContent = category.icon;

                const content = document.createElement('div');
                content.className = 'category-content';

                const title = document.createElement('h3');
                title.textContent = category.name;

                const desc = document.createElement('p');
                desc.className = 'category-desc';
                desc.textContent = category.description;

                const count = document.createElement('p');
                count.className = 'category-count';
                count.textContent = testCount > 0 ? testCount + '个测试' : '即将推出';

                content.appendChild(title);
                content.appendChild(desc);
                content.appendChild(count);
                card.appendChild(icon);
                card.appendChild(content);
                container.appendChild(card);

                card.addEventListener('click', function() {
                    showTestsForCategory(categoryKey, category.name);
                });
            });
        }

        function showTestsForCategory(categoryKey, categoryName) {
            document.getElementById('categories-section').classList.add('hidden');
            document.getElementById('tests-section').classList.remove('hidden');
            document.getElementById('current-category').textContent = categoryName;
            renderTestList(categoryKey);
        }

        function renderTestList(categoryKey) {
            const listContainer = document.getElementById('test-list');
            listContainer.innerHTML = '';

            const tests = window.TestConfig.getTestsByCategory(categoryKey);

            if (!tests || tests.length === 0) {
                const emptyItem = document.createElement('li');
                emptyItem.textContent = '暂无测试';
                listContainer.appendChild(emptyItem);
                return;
            }

            tests.forEach(function(test) {
                const testItem = document.createElement('li');
                testItem.className = 'test-item';

                const testLink = document.createElement('a');
                testLink.href = `run.html?testId=${test.id}&category=${categoryKey}`;
                testLink.className = 'test-link';

                // 先尝试加载封面图片
                const testCover = new Image();
                testCover.className = 'test-cover';
                testCover.src = `data/cover/${test.id}.jpg`;
                testCover.alt = test.title;

                // 图片加载失败时显示 emoji
                testCover.onerror = function() {
                    const emojiDiv = document.createElement('div');
                    emojiDiv.className = 'test-emoji';
                    emojiDiv.textContent = test.emoji || '📋';
                    testLink.replaceChild(emojiDiv, this);
                };

                // 信息容器
                const infoBox = document.createElement('div');
                infoBox.className = 'test-info-box';

                const testTitle = document.createElement('span');
                testTitle.className = 'test-title';
                testTitle.textContent = test.title;

                const testInfo = document.createElement('span');
                testInfo.className = 'test-info';
                testInfo.textContent = `${test.questionCount}题 · ${test.estimateMinutes}分钟`;

                infoBox.appendChild(testTitle);
                infoBox.appendChild(testInfo);

                testLink.appendChild(testCover);
                testLink.appendChild(infoBox);
                testItem.appendChild(testLink);

                listContainer.appendChild(testItem);
            });
        }

        function initializeApp() {
            window.TestConfig.init();
            renderCategories();

            document.getElementById('back-to-categories').addEventListener('click', function() {
                document.getElementById('tests-section').classList.add('hidden');
                document.getElementById('categories-section').classList.remove('hidden');
            });

            const showCategory = getShowCategoryFromUrl();
            if (showCategory) {
                const categories = window.TestConfig.getAllCategories();
                if (categories[showCategory]) {
                    setTimeout(() => {
                        showTestsForCategory(showCategory, categories[showCategory].name);
                    }, 100);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', initializeApp);
    })();
    </script>

    <!-- 萤火虫背景动画 -->
    <script>
    (function() {
        const canvas = document.getElementById('firefly-canvas');
        const ctx = canvas.getContext('2d');

        // 正确设置 Canvas 尺寸（处理高分屏）
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const width = window.innerWidth;
            const height = window.innerHeight;

            // 设置 CSS 尺寸
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            // 设置像素尺寸（考虑设备像素比）
            canvas.width = width * dpr;
            canvas.height = height * dpr;

            // 缩放绘图上下文以匹配设备像素比
            ctx.scale(dpr, dpr);
        }
        resize();
        window.addEventListener('resize', resize);

        // 保存实际显示尺寸供萤火虫使用
        let displayWidth = window.innerWidth;
        let displayHeight = window.innerHeight;
        window.addEventListener('resize', function() {
            displayWidth = window.innerWidth;
            displayHeight = window.innerHeight;
        });

        // 萤火虫类
        class Firefly {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * displayWidth;
                this.y = Math.random() * displayHeight;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = 0;
                this.alphaSpeed = Math.random() * 0.015 + 0.008;
                this.phase = Math.random() * Math.PI * 2;
                this.glowSize = Math.random() * 15 + 8;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.speedX + Math.sin(this.wobble) * 0.2;
                this.y += this.speedY + Math.cos(this.wobble) * 0.15;
                this.wobble += this.wobbleSpeed;

                if (this.x < -30) this.x = displayWidth + 30;
                if (this.x > displayWidth + 30) this.x = -30;
                if (this.y < -30) this.y = displayHeight + 30;
                if (this.y > displayHeight + 30) this.y = -30;

                this.phase += this.alphaSpeed;
                this.alpha = (Math.sin(this.phase) + 1) / 2;
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.glowSize
                );
                gradient.addColorStop(0, `rgba(255, 255, 180, ${this.alpha * 0.5})`);
                gradient.addColorStop(0.4, `rgba(220, 255, 120, ${this.alpha * 0.25})`);
                gradient.addColorStop(1, 'rgba(150, 200, 80, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 220, ${this.alpha * 0.85})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 240, ${this.alpha})`;
                ctx.fill();
            }
        }

        // 创建萤火虫
        const fireflies = [];
        const fireflyCount = 50;

        for (let i = 0; i < fireflyCount; i++) {
            fireflies.push(new Firefly());
        }

        // 绘制背景
        function drawBackground() {
            ctx.clearRect(0, 0, displayWidth, displayHeight);
        }

        // 主循环
        function animate() {
            drawBackground();

            fireflies.forEach(firefly => {
                firefly.update();
                firefly.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    })();
    </script>
