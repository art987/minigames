<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线抠图工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        fetch('common-header.html')
            .then(response => response.text())
            .then(html => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                
                const style = tempDiv.querySelector('style').outerHTML;
                const header = tempDiv.querySelector('header').outerHTML;
                const script = tempDiv.querySelector('script').textContent;
                
                document.head.insertAdjacentHTML('beforeend', style);
                document.body.insertAdjacentHTML('afterbegin', header);
                
                eval(script);
                initCommonHeader();
            })
            .catch(error => console.error('加载公共标题头失败:', error));
    </script>
    <link rel="stylesheet" href="bg-remove.css">
</head>
<body>
    <div class="banner">
        <img src="bg-remove.png" alt="在线抠图工具" class="banner-image">
    </div>
    
    <div class="container">
        <div class="tool-container">
            <iframe id="bgRemoveIframe" height="800px" src="https://zh.bgsub.com/webapp/" frameborder="0" allowfullscreen></iframe>
        </div>

 
    </div>
</body>
</html>
