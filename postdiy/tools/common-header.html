<!-- 公共标题头组件 -->
<header class="common-header">
  <div class="header-content">
    <button class="back-btn" id="backBtn" title="返回">
      <i class="fa fa-arrow-left"></i>
    </button>
    <h1 class="header-title" id="headerTitle">闪喵工具箱</h1>
    <div class="header-spacer"></div>
  </div>
</header>

<style>
/* 公共标题头样式 */
.common-header {
    background: rgba(255, 255, 255, 0.95);
    padding: 15px 20px;
    box-shadow: 0 0px 15px #00000024;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    border-bottom: 1px solid #ddd;
}

.header-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 12px;
  color: #ff6b6b;
  font-size: 18px;
  border-radius: 8px;
  transition: background 0.2s, color 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.back-btn:hover {
  background: rgba(255, 107, 107, 0.1);
  color: #ee5a6f;
}

.header-title {
  font-size: 20px;
  color: #333;
  margin: 0;
  font-weight: 600;
  text-align: center;
  flex: 1;
}

.header-spacer {
  width: 40px; /* 占位，保持标题居中 */
}

/* 响应式设计 */
@media (max-width: 768px) {
  .common-header {
    padding: 12px 15px;
  }
  
  .header-title {
    font-size: 18px;
  }
  
  .back-btn {
    font-size: 16px;
  }
}
</style>

<script>
// 公共标题头交互逻辑
function initCommonHeader() {
  const backBtn = document.getElementById('backBtn');
  const headerTitle = document.getElementById('headerTitle');
  
  // 设置返回按钮功能
  backBtn.addEventListener('click', function() {
    // 直接返回频道首页，避免历史记录问题
    const currentPath = window.location.pathname;
    // 检查是否在tools目录下
    if (currentPath.includes('/postdiy/tools/')) {
      // 直接返回tools频道首页
      window.location.href = '/postdiy/tools/index.html';
    } else if (currentPath.includes('/postdiy/business/')) {
      // 直接返回business频道首页
      window.location.href = '/postdiy/business/index.html';
    } else {
      // 其他情况返回首页
      window.location.href = '/index.html';
    }
  });
  
  // 可以通过 URL 参数动态设置标题
  const urlParams = new URLSearchParams(window.location.search);
  const customTitle = urlParams.get('title');
  if (customTitle) {
    headerTitle.textContent = customTitle;
  }
  
  // 检测当前频道，自动设置标题
  const currentPath = window.location.pathname;
  if (currentPath.includes('/postdiy/tools/') && !customTitle) {
    headerTitle.textContent = '闪喵工具箱';
  } else if (currentPath.includes('/postdiy/business/') && !customTitle) {
    headerTitle.textContent = '闪喵生意经';
  }
}

// 页面加载完成后初始化
if (document.readyState === 'complete') {
  initCommonHeader();
} else {
  document.addEventListener('DOMContentLoaded', initCommonHeader);
}
</script>
