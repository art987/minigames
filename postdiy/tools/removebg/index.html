<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闪喵Logo抠图器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>闪喵Logo抠图器</h1>
            <p class="subtitle">轻量工具，仅适合背景单一的图片</p>
        </header>

        <main>
            <div class="upload-section" id="uploadSection">
                <div class="upload-box" id="uploadBox">
                    <i class="fa fa-cloud-upload-alt upload-icon"></i>
                    <p class="upload-text">点击上传图片</p>
                    <p class="upload-hint">支持 JPG、PNG、WebP</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <div class="tips-box">
                    <p class="tips-title">💡 使用技巧</p>
                    <ul class="tips-list">
                        <li>上传背景单一的图片效果更佳</li>
                        <li>裁剪时保留适量背景方便识别</li>
                    </ul>
                </div>
            </div>

            <div class="preview-section" id="previewSection" style="display: none;">
                <div class="preview-container">
                    <div class="preview-box">
                        <h3>裁剪后</h3>
                        <canvas id="originalCanvas"></canvas>
                    </div>
                    <div class="preview-box result">
                        <h3>抠图结果</h3>
                        <canvas id="resultCanvas"></canvas>
                    </div>
                </div>

                <div class="mode-selector">
                    <div class="mode-buttons" id="modeButtons">
                        <button class="mode-btn active" data-mode="auto">自动</button>
                        <button class="mode-btn" data-mode="white">白色</button>
                        <button class="mode-btn" data-mode="black">黑色</button>
                        <button class="mode-btn" data-mode="custom">自定义</button>
                    </div>
                </div>

                <div class="color-picker-popup" id="colorPickerPopup">
                    <div class="color-picker-panel">
                        <div class="color-picker-header">
                            <span>选择背景色</span>
                            <button class="color-picker-close" id="colorPickerClose">✕</button>
                        </div>
                        <div class="color-picker-body">
                            <div class="color-picker-preview">
                                <canvas id="colorPickerCanvas"></canvas>
                                <div class="color-picker-crosshair" id="colorCrosshair"></div>
                            </div>
                            <div class="color-picker-result">
                                <div class="color-swatch" id="colorSwatch"></div>
                                <div class="color-info">
                                    <p class="color-value" id="colorValue">#310856</p>
                                    <div class="tolerance-row">
                                        <span>容差</span>
                                        <input type="range" id="toleranceSlider" min="0" max="100" value="50">
                                        <span id="toleranceValue">50%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="color-picker-footer">
                            <button class="btn btn-primary btn-sm" id="colorConfirmBtn">确定抠图</button>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" id="reCropBtn">
                        <i class="fa fa-crop"></i> 重新裁剪
                    </button>
                    <button class="btn btn-outline" id="changeImageBtn">
                        <i class="fa fa-image"></i> 更换图片
                    </button>
                    <button class="btn btn-success" id="downloadBtn" disabled>
                        <i class="fa fa-download"></i> 下载 PNG
                    </button>
                </div>

            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="loading-spinner"></div>
                <p class="loading-text" id="loadingText">处理中...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </main>

        <footer>
            <p class="footer-text">🖥️ 完全前端处理，保护隐私</p>
        </footer>
    </div>

    <div class="crop-modal" id="cropModal">
        <div class="crop-modal-content">
            <div class="crop-modal-header">
                <h3>裁剪图片</h3>
                <button class="crop-modal-close" id="cropModalClose">✕</button>
            </div>
            <div class="crop-modal-body">
                <div class="crop-wrapper" id="cropWrapper">
                    <canvas id="cropCanvas"></canvas>
                    <div class="crop-overlay" id="cropOverlay">
                        <div class="crop-box" id="cropBox">
                            <div class="crop-guide horizontal top"></div>
                            <div class="crop-guide horizontal bottom"></div>
                            <div class="crop-guide vertical left"></div>
                            <div class="crop-guide vertical right"></div>
                            <div class="crop-handle top-left"></div>
                            <div class="crop-handle top-right"></div>
                            <div class="crop-handle bottom-left"></div>
                            <div class="crop-handle bottom-right"></div>
                        </div>
                    </div>
                </div>
                <div class="crop-tips">
                    <p>📌 拖动四角选择要保留的区域</p>
                    <p>🎯 背景色越单一，抠图效果越好</p>
                </div>
            </div>
            <div class="crop-modal-footer">
                <button class="btn btn-secondary" id="cropResetBtn">
                    <i class="fa fa-refresh"></i> 重选
                </button>
                <button class="btn btn-primary" id="cropConfirmBtn">
                    <i class="fa fa-check"></i> 确认
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
